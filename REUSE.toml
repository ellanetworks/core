version = 1

# Non-source files (build config, CI, docs, fixtures) authored by Ella Networks.
# Source files (*.go, *.c, *.h) carry their own SPDX headers and are not covered
# here so that per-file upstream attribution stays explicit.
[[annotations]]
path = [
  "**/*.yaml", "**/*.yml", "**/*.json", "**/*.toml", "**/*.md", "**/*.txt",
  "**/*.sh", "**/*.sql", "**/*.proto", "**/*.tmpl", "**/*.html", "**/*.css",
  "go.mod", "go.sum", "**/go.mod", "**/go.sum", "**/Dockerfile", "Dockerfile",
  ".gitignore", ".dockerignore", "**/.gitignore", "**/.prettierignore",
]
precedence = "aggregate"
SPDX-FileCopyrightText = "Ella Networks Inc."
SPDX-License-Identifier = "Apache-2.0"

# Apache NOTICE file (attribution for third-party-derived code).
[[annotations]]
path = "NOTICE"
precedence = "aggregate"
SPDX-FileCopyrightText = "Ella Networks Inc."
SPDX-License-Identifier = "Apache-2.0"

# Verbatim third-party file kept pristine (eUPF) — carries only the upstream
# notice, no Ella header. See the attribution review.
[[annotations]]
path = "internal/upf/ebpf/xdp/utils/types.h"
precedence = "override"
SPDX-FileCopyrightText = "2023 Edgecom LLC"
SPDX-License-Identifier = "Apache-2.0"

# bpf2go-generated Go bindings + compiled eBPF objects (build output of the XDP
# C; reproducible via bpf2go, not hand-edited).
[[annotations]]
path = ["internal/upf/ebpf/*_bpf.go", "internal/upf/ebpf/*.o"]
precedence = "aggregate"
SPDX-FileCopyrightText = "Ella Networks Inc."
SPDX-License-Identifier = "Apache-2.0"

# clang-tidy config (Ella's own; selects kernel check sets).
[[annotations]]
path = "internal/upf/ebpf/.clang-tidy"
precedence = "aggregate"
SPDX-FileCopyrightText = "Ella Networks Inc."
SPDX-License-Identifier = "Apache-2.0"

# clang-format config copied from the Linux kernel (declares GPL-2.0 inline).
[[annotations]]
path = "internal/upf/ebpf/.clang-format"
precedence = "aggregate"
SPDX-FileCopyrightText = "The Linux Kernel Authors"

# UI non-source files that can't carry a comment header: JSON configs, binary
# assets, and placeholders. (TypeScript/React/SCSS source carry per-file headers.)
[[annotations]]
path = ["ui/*.json", "ui/**/*.json", "ui/**/*.ico", "ui/**/*.svg", "ui/.gitkeep", "ui/**/.gitkeep"]
precedence = "aggregate"
SPDX-FileCopyrightText = "Ella Networks Inc."
SPDX-License-Identifier = "Apache-2.0"

# Bundled Source Code Pro fonts (Adobe) under the SIL Open Font License.
[[annotations]]
path = "ui/**/*.woff2"
precedence = "override"
SPDX-FileCopyrightText = "2010-2019 Adobe Systems Incorporated"
SPDX-License-Identifier = "OFL-1.1"

# Documentation site (docs.ellanetworks.com) — Ella-authored content and assets
# (diagrams, screenshots, demo casts, glue scripts). Markdown/CSS/HTML are
# covered by the top-level globs; this covers the remaining asset types.
[[annotations]]
path = "docs/**"
precedence = "aggregate"
SPDX-FileCopyrightText = "Ella Networks Inc."
SPDX-License-Identifier = "Apache-2.0"

# Build/CI/packaging/test-infrastructure files (Ella-authored): version,
# CODEOWNERS, packaging hooks/scripts, the docs requirements pin, the Alloy
# observability config, and the integration-test PKI fixtures + compose glue.
[[annotations]]
path = [
  "CODEOWNERS", "version/VERSION", "requirements-docs.in",
  "service/bin/core-start", "snap/hooks/install",
  "observability/alloy/config.alloy",
  "integration/compose/bgp/Dockerfile.gobgp",
  "integration/compose/pki/README", "integration/compose/pki/*.pem",
  "integration/network_test.py",
]
precedence = "aggregate"
SPDX-FileCopyrightText = "Ella Networks Inc."
SPDX-License-Identifier = "Apache-2.0"

# Test fixtures and Go fuzz corpora (Ella-authored): captured byte vectors and
# seed inputs that can't carry a comment header.
[[annotations]]
path = ["**/testdata/**"]
precedence = "aggregate"
SPDX-FileCopyrightText = "Ella Networks Inc."
SPDX-License-Identifier = "Apache-2.0"
