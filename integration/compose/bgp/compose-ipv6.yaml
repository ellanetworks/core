configs:
  ella_config:
    content: |
      logging:
        system:
          level: "debug"
          output: "stdout"
        audit:
          output: "stdout"
      db:
        path: "core.db"
      interfaces:
        n2:
          address: "2001:db8:1::10"
        n3:
          name: "n3"
        n6:
          name: "n6"
        api:
          address: "2001:db8:1::10"
          port: 5002
      xdp:
        attach-mode: "generic"
  gobgp_config:
    content: |
      [global.config]
        as = 65001
        router-id = "10.6.0.4"
        port = 179

      [[neighbors]]
        [neighbors.config]
          neighbor-address = "fd00:6::2"
          peer-as = 64512
        [[neighbors.afi-safis]]
          [neighbors.afi-safis.config]
            afi-safi-name = "ipv6-unicast"

services:
  ella-core:
    image: ella-core:latest
    configs:
      - source: ella_config
        target: /core.yaml
    restart: unless-stopped
    entrypoint: /bin/core --config /core.yaml
    privileged: true
    ports:
      - "5002:5002"
    networks:
      default:
        driver_opts:
              com.docker.network.endpoint.ifname: eth0
        ipv6_address: 2001:db8:1::10
      n3:
        driver_opts:
              com.docker.network.endpoint.ifname: n3
        ipv6_address: 2001:db8:3::10
      n6:
        driver_opts:
              com.docker.network.endpoint.ifname: n6
        ipv6_address: fd00:6::2
  ella-core-tester:
    image: ella-core-tester:latest
    entrypoint:
      - /bin/sh
      - -c
      - "ip -6 addr add 2001:db8:3::13/64 dev n3 || true; sleep infinity"
    restart: unless-stopped
    privileged: true
    networks:
      default:
        driver_opts:
              com.docker.network.endpoint.ifname: eth0
        ipv6_address: 2001:db8:1::11
      n3:
        driver_opts:
              com.docker.network.endpoint.ifname: n3
        ipv6_address: 2001:db8:3::11
  router:
    image: ghcr.io/ellanetworks/ubuntu-router:0.1
    command:
      - exec
      - /bin/bash
      - -lc
      - >
        ip -6 route add fd45::/48 dev n6 via fd00:6::2;
        trap : TERM INT;
        python3 /responder.py 34242 & wait
    restart: unless-stopped
    privileged: true
    networks:
      n6:
        driver_opts:
              com.docker.network.endpoint.ifname: n6
        ipv6_address: fd00:6::3
  gobgp:
    build:
      context: .
      dockerfile: Dockerfile.gobgp
    configs:
      - source: gobgp_config
        target: /gobgpd.toml
    entrypoint: ["gobgpd", "-f", "/gobgpd.toml", "--log-level=info"]
    restart: unless-stopped
    privileged: true
    networks:
      n6:
        driver_opts:
              com.docker.network.endpoint.ifname: n6
        ipv6_address: fd00:6::4

networks:
  default:
    enable_ipv6: true
    ipam:
      config:
        - subnet: 2001:db8:1::/64
  n3:
    internal: true
    enable_ipv6: true
    ipam:
      config:
        - subnet: 2001:db8:3::/64
  n6:
    enable_ipv6: true
    ipam:
      config:
        - subnet: fd00:6::/64
