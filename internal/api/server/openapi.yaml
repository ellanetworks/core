openapi: "3.1.0"
info:
  title: Ella Core API
  description: |
    RESTful API for managing a 5G private mobile network powered by Ella Core.

    Manage subscribers, QoS policies, data networks, network routes,
    operator configuration, radios, and observability data.

    ## Authentication

    Most endpoints require a Bearer token in the `Authorization` header.
    The token can be either:

    - A **JWT** obtained from the login endpoint (short-lived, 15 minutes).
    - An **API token** (prefix `ellacore_`) created via the API tokens endpoint (long-lived, optional expiry).

    Example: `Authorization: Bearer ellacore_abc123_secretpart`

    ## Response Envelope

    All JSON responses are wrapped:
    - Success: `{"result": <payload>}`
    - Error: `{"error": "message"}`

    ## Pagination

    List endpoints accept `page` (default 1) and `per_page` (default 25, max 100) query parameters.
    Responses include `items`, `page`, `per_page`, and `total_count`.
  version: "1.0.0"
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0

servers:
  - url: "{scheme}://{host}"
    variables:
      scheme:
        default: https
        enum: [https, http]
      host:
        default: localhost:5000

security:
  - BearerAuth: []

tags:
  - name: Status
    description: System health and version information (unauthenticated).
  - name: Metrics
    description: Prometheus metrics endpoint (unauthenticated).
  - name: Profiling
    description: Runtime profiling endpoints (pprof) for diagnostics. Requires admin privileges.
  - name: Initialization
    description: First-time setup to create the initial admin user (unauthenticated).
  - name: Authentication
    description: Login, token refresh, logout, and token validation.
  - name: Users
    description: Manage user accounts and API tokens.
  - name: Subscribers
    description: Provision and manage 5G subscribers on the network. Each subscriber is assigned to a profile.
  - name: Subscriber Usage
    description: Monitor and manage subscriber data usage records.
  - name: Profiles
    description: Manage subscriber profiles that define UE-level aggregate maximum bit rates (UE-AMBR).
  - name: Slices
    description: Manage network slices (S-NSSAI). Each slice defines a Slice Service Type (SST) and optional Slice Differentiator (SD). Ella Core uses slice information alongside the data network name to determine which policies apply to a subscriber's session.
  - name: Policies
    description: Define QoS policies (session AMBR, 5QI, ARP) that bind a profile to a slice and data network.
  - name: Operator
    description: Configure the mobile network operator identity, slice, tracking areas, cryptographic keys, and network name (SPN).
  - name: Data Networks
    description: Manage data networks (DNNs/APNs) that subscribers connect through.
  - name: Routes
    description: Manage static IP routes on the network interfaces.
  - name: NAT
    description: Enable or disable Network Address Translation on the user plane.
  - name: Flow Accounting
    description: Enable or disable per-flow traffic accounting on the user plane.
  - name: Interfaces
    description: View and configure network interface settings (N2, N3, N6, API).
  - name: Radios
    description: View connected radio base stations (gNBs) and their configuration.
  - name: Radio Events
    description: View and manage NGAP protocol events between the core and radios.
  - name: Flow Reports
    description: View and manage per-flow traffic reports collected by the user plane.
  - name: Audit Logs
    description: View audit log entries that record administrative actions.
  - name: Cluster
    description: Manage cluster membership for high-availability deployments. Only available when clustering is enabled.
  - name: Backup & Restore
    description: Create and restore full database backups.
  - name: Support Bundle
    description: Generate a diagnostic support bundle for troubleshooting.

paths:
  # ── Status ──────────────────────────────────────────────────────────────
  /api/v1/status:
    get:
      operationId: getStatus
      tags: [Status]
      summary: Get system status
      description: Returns the software version, git revision, and whether the system has been initialized with a first user.
      security: []
      responses:
        "200":
          description: |
            System status. When clustering is enabled, the response includes an
            `X-Ella-Role` header (`Leader`, `Follower`, or `Candidate`) that
            load balancers can use to direct write traffic to the leader node.
          headers:
            X-Ella-Role:
              description: Raft role of the responding node. Only present when clustering is enabled.
              required: false
              schema:
                type: string
                enum: [Leader, Follower, Candidate]
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponseEnvelope"

  # ── Metrics ─────────────────────────────────────────────────────────────
  /api/v1/metrics:
    get:
      operationId: getMetrics
      tags: [Metrics]
      summary: Get Prometheus metrics
      description: Returns all application metrics in Prometheus text exposition format.
      security: []
      responses:
        "200":
          description: Prometheus metrics.
          content:
            text/plain:
              schema:
                type: string

  # ── Profiling (Pprof) ───────────────────────────────────────────────────
  /api/v1/pprof/:
    get:
      operationId: getPprofIndex
      tags: [Profiling]
      summary: Get pprof index
      description: Returns an HTML index page listing available runtime profiling endpoints.
      responses:
        "200":
          description: Pprof index page.
          content:
            text/html:
              schema:
                type: string
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/pprof/cmdline:
    get:
      operationId: getPprofCmdline
      tags: [Profiling]
      summary: Get process command line
      description: Returns the command-line invocation of the running process.
      responses:
        "200":
          description: Process command line.
          content:
            text/plain:
              schema:
                type: string
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/pprof/profile:
    get:
      operationId: getPprofCPUProfile
      tags: [Profiling]
      summary: Capture CPU profile
      description: Captures a CPU profile for the given duration.
      parameters:
        - name: seconds
          in: query
          schema:
            type: integer
            minimum: 1
          description: Duration of profile capture in seconds. Defaults to Go's pprof default.
      responses:
        "200":
          description: CPU profile data.
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/pprof/symbol:
    get:
      operationId: getPprofSymbol
      tags: [Profiling]
      summary: Resolve program counters
      description: Resolves program counters to function names.
      responses:
        "200":
          description: Symbol resolution output.
          content:
            text/plain:
              schema:
                type: string
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      operationId: postPprofSymbol
      tags: [Profiling]
      summary: Resolve posted program counters
      description: Accepts posted program counters and resolves them to function names.
      requestBody:
        required: false
        content:
          text/plain:
            schema:
              type: string
      responses:
        "200":
          description: Symbol resolution output.
          content:
            text/plain:
              schema:
                type: string
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/pprof/trace:
    get:
      operationId: getPprofTrace
      tags: [Profiling]
      summary: Capture execution trace
      description: Captures an execution trace for the given duration.
      parameters:
        - name: seconds
          in: query
          schema:
            type: integer
            minimum: 1
          description: Duration of trace capture in seconds. Defaults to Go's pprof default.
      responses:
        "200":
          description: Trace data.
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/pprof/allocs:
    get:
      operationId: getPprofAllocs
      tags: [Profiling]
      summary: Get allocation profile
      description: Returns the allocation profile.
      parameters:
        - name: debug
          in: query
          schema:
            type: integer
            enum: [0, 1]
          description: Set to 1 for human-readable output.
      responses:
        "200":
          description: Allocation profile data.
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
            text/plain:
              schema:
                type: string
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/pprof/block:
    get:
      operationId: getPprofBlock
      tags: [Profiling]
      summary: Get blocking profile
      description: Returns the goroutine blocking profile.
      parameters:
        - name: debug
          in: query
          schema:
            type: integer
            enum: [0, 1]
          description: Set to 1 for human-readable output.
      responses:
        "200":
          description: Blocking profile data.
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
            text/plain:
              schema:
                type: string
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/pprof/goroutine:
    get:
      operationId: getPprofGoroutine
      tags: [Profiling]
      summary: Get goroutine profile
      description: Returns the goroutine stack profile.
      parameters:
        - name: debug
          in: query
          schema:
            type: integer
            enum: [0, 1]
          description: Set to 1 for human-readable output.
      responses:
        "200":
          description: Goroutine profile data.
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
            text/plain:
              schema:
                type: string
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/pprof/heap:
    get:
      operationId: getPprofHeap
      tags: [Profiling]
      summary: Get heap profile
      description: Returns the heap allocation profile.
      parameters:
        - name: debug
          in: query
          schema:
            type: integer
            enum: [0, 1]
          description: Set to 1 for human-readable output.
        - name: gc
          in: query
          schema:
            type: integer
            enum: [0, 1]
          description: Set to 1 to run garbage collection before taking the heap profile.
      responses:
        "200":
          description: Heap profile data.
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
            text/plain:
              schema:
                type: string
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/pprof/mutex:
    get:
      operationId: getPprofMutex
      tags: [Profiling]
      summary: Get mutex profile
      description: Returns the mutex contention profile.
      parameters:
        - name: debug
          in: query
          schema:
            type: integer
            enum: [0, 1]
          description: Set to 1 for human-readable output.
      responses:
        "200":
          description: Mutex profile data.
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
            text/plain:
              schema:
                type: string
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/pprof/threadcreate:
    get:
      operationId: getPprofThreadcreate
      tags: [Profiling]
      summary: Get thread creation profile
      description: Returns the thread creation profile.
      parameters:
        - name: debug
          in: query
          schema:
            type: integer
            enum: [0, 1]
          description: Set to 1 for human-readable output.
      responses:
        "200":
          description: Thread creation profile data.
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
            text/plain:
              schema:
                type: string
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  # ── Initialization ──────────────────────────────────────────────────────
  /api/v1/init:
    post:
      operationId: initialize
      tags: [Initialization]
      summary: Initialize the system
      description: |
        Creates the first admin user. This endpoint only works when the system
        has zero users (i.e., `GET /api/v1/status` returns `initialized: false`).
        Returns a JWT and sets a session cookie.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InitializeParams"
      responses:
        "201":
          description: System initialized, first admin user created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InitializeResponseEnvelope"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalError"

  # ── Authentication ──────────────────────────────────────────────────────
  /api/v1/auth/login:
    post:
      operationId: login
      tags: [Authentication]
      summary: Log in
      description: Authenticates a user with email and password. Returns a JWT and sets a session cookie for token refresh.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginParams"
      responses:
        "200":
          description: Login successful.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponseEnvelope"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v1/auth/refresh:
    post:
      operationId: refreshToken
      tags: [Authentication]
      summary: Refresh JWT
      description: Issues a new JWT using the session cookie set during login. No request body needed.
      security: []
      responses:
        "200":
          description: New JWT issued.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RefreshResponseEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v1/auth/logout:
    post:
      operationId: logout
      tags: [Authentication]
      summary: Log out
      description: Deletes the server-side session and clears the session cookie.
      security: []
      responses:
        "204":
          description: Logged out successfully. No body returned.

  /api/v1/auth/lookup-token:
    post:
      operationId: lookupToken
      tags: [Authentication]
      summary: Validate a token
      description: Checks whether the Bearer token in the Authorization header is valid.
      responses:
        "200":
          description: Token validity result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LookupTokenResponseEnvelope"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/v1/auth/rotate-secret:
    post:
      operationId: rotateSecret
      tags: [Authentication]
      summary: Rotate the JWT secret
      description: |
        Generates a new JWT signing secret. All existing user sessions are
        immediately invalidated — users must re-authenticate. API tokens
        (prefixed `ellacore_`) are not affected. Requires admin role.
      responses:
        "200":
          description: Secret rotated successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RotateSecretResponseEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  # ── Users ───────────────────────────────────────────────────────────────
  /api/v1/users/me:
    get:
      operationId: getLoggedInUser
      tags: [Users]
      summary: Get current user
      description: Returns the email and role of the currently authenticated user.
      responses:
        "200":
          description: Current user info.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponseEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/users/me/password:
    put:
      operationId: updateMyPassword
      tags: [Users]
      summary: Update own password
      description: |
        Change the password of the currently authenticated user.
        Requires the current password for verification.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMyPasswordParams"
      responses:
        "200":
          $ref: "#/components/responses/Success"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/users/me/api-tokens:
    get:
      operationId: listMyAPITokens
      tags: [Users]
      summary: List my API tokens
      description: Returns a paginated list of API tokens belonging to the current user. Token secrets are never returned.
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PerPage"
      responses:
        "200":
          description: Paginated list of API tokens.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAPITokensResponseEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: createMyAPIToken
      tags: [Users]
      summary: Create an API token
      description: |
        Creates a new API token for the current user. The full token string
        (prefixed with `ellacore_`) is returned once and cannot be retrieved again.
        Maximum 12 tokens per user.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAPITokenParams"
      responses:
        "201":
          description: Token created. The full token is in the response — store it securely.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAPITokenResponseEnvelope"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          $ref: "#/components/responses/Conflict"

  /api/v1/users/me/api-tokens/{id}:
    delete:
      operationId: deleteMyAPIToken
      tags: [Users]
      summary: Delete an API token
      description: Revokes and deletes one of the current user's API tokens by its token ID.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: The token ID (not the full token string).
      responses:
        "200":
          $ref: "#/components/responses/Success"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/users:
    get:
      operationId: listUsers
      tags: [Users]
      summary: List users
      description: Returns a paginated list of all user accounts. Requires admin privileges.
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PerPage"
      responses:
        "200":
          description: Paginated list of users.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListUsersResponseEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: createUser
      tags: [Users]
      summary: Create a user
      description: Creates a new user account. Maximum 50 users. Requires admin privileges.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserParams"
      responses:
        "201":
          $ref: "#/components/responses/Success"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          $ref: "#/components/responses/Conflict"

  /api/v1/users/{email}:
    get:
      operationId: getUser
      tags: [Users]
      summary: Get a user
      description: Returns the email and role of a specific user.
      parameters:
        - $ref: "#/components/parameters/EmailPath"
      responses:
        "200":
          description: User details.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponseEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      operationId: updateUser
      tags: [Users]
      summary: Update a user's role
      description: Changes the role of an existing user. Requires admin privileges.
      parameters:
        - $ref: "#/components/parameters/EmailPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserParams"
      responses:
        "200":
          $ref: "#/components/responses/Success"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteUser
      tags: [Users]
      summary: Delete a user
      description: Permanently deletes a user account and all associated API tokens.
      parameters:
        - $ref: "#/components/parameters/EmailPath"
      responses:
        "200":
          $ref: "#/components/responses/Success"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/users/{email}/password:
    put:
      operationId: updateUserPassword
      tags: [Users]
      summary: Update a user's password (admin)
      description: Resets the password of any user. Requires admin privileges.
      parameters:
        - $ref: "#/components/parameters/EmailPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePasswordParams"
      responses:
        "200":
          $ref: "#/components/responses/Success"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/users/{email}/api-tokens:
    get:
      operationId: listUserAPITokens
      tags: [Users]
      summary: List a user's API tokens (admin)
      description: Returns a paginated list of API tokens belonging to the specified user. Requires admin privileges.
      parameters:
        - $ref: "#/components/parameters/EmailPath"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PerPage"
      responses:
        "200":
          description: Paginated list of API tokens.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAPITokensResponseEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      operationId: createUserAPIToken
      tags: [Users]
      summary: Create an API token for a user (admin)
      description: |
        Creates a new API token for the specified user. The full token string
        (prefixed with `ellacore_`) is returned once and cannot be retrieved again.
        Maximum 12 tokens per user. Requires admin privileges.
      parameters:
        - $ref: "#/components/parameters/EmailPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAPITokenParams"
      responses:
        "201":
          description: Token created. The full token is in the response — store it securely.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAPITokenResponseEnvelope"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /api/v1/users/{email}/api-tokens/{id}:
    delete:
      operationId: deleteUserAPIToken
      tags: [Users]
      summary: Delete a user's API token (admin)
      description: Revokes and deletes one of the specified user's API tokens by its token ID. Requires admin privileges.
      parameters:
        - $ref: "#/components/parameters/EmailPath"
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: The token ID (not the full token string).
      responses:
        "200":
          $ref: "#/components/responses/Success"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  # ── Subscribers ─────────────────────────────────────────────────────────
  /api/v1/subscribers:
    get:
      operationId: listSubscribers
      tags: [Subscribers]
      summary: List subscribers
      description: |
        Returns a paginated list of all provisioned 5G subscribers.
        Each entry includes the IMSI, assigned profile, and connection status
        (whether the device is currently registered on the network and its IP address).
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PerPage"
        - name: radio
          in: query
          schema:
            type: string
          description: Filter subscribers connected to a specific radio by name.
      responses:
        "200":
          description: Paginated list of subscribers.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListSubscribersResponseEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: createSubscriber
      tags: [Subscribers]
      summary: Provision a subscriber
      description: |
        Registers a new 5G subscriber on the network. Requires the IMSI, permanent key (K),
        sequence number, and an existing profile name. Optionally provide the OPc
        value — if omitted, it is derived from the operator code.
        Maximum 1000 subscribers.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSubscriberParams"
      responses:
        "201":
          $ref: "#/components/responses/Success"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /api/v1/subscribers/{imsi}:
    get:
      operationId: getSubscriber
      tags: [Subscribers]
      summary: Get subscriber details
      description: |
        Returns full details of a subscriber including connection status,
        IMEI of the connected device, negotiated ciphering/integrity algorithms,
        last-seen radio information, and minimal PDU session information.
      parameters:
        - $ref: "#/components/parameters/ImsiPath"
      responses:
        "200":
          description: Subscriber details.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriberDetailResponseEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      operationId: updateSubscriber
      tags: [Subscribers]
      summary: Update a subscriber
      description: Updates the profile assigned to a subscriber.
      parameters:
        - $ref: "#/components/parameters/ImsiPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSubscriberParams"
      responses:
        "200":
          $ref: "#/components/responses/Success"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteSubscriber
      tags: [Subscribers]
      summary: Delete a subscriber
      description: Deregisters the 5G subscriber from the network and removes it from the database. If the device is currently connected, its session is terminated.
      parameters:
        - $ref: "#/components/parameters/ImsiPath"
      responses:
        "200":
          $ref: "#/components/responses/Success"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/subscribers/{imsi}/credentials:
    get:
      operationId: getSubscriberCredentials
      tags: [Subscribers]
      summary: Get subscriber credentials
      description: |
        Returns the authentication credentials (permanent key, OPc, and sequence number)
        for a subscriber. Requires the `subscriber:read_credentials` permission,
        which is granted only to Admin and Network Manager roles.
      parameters:
        - $ref: "#/components/parameters/ImsiPath"
      responses:
        "200":
          description: Subscriber credentials.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriberCredentialsResponseEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  # ── Subscriber Usage ────────────────────────────────────────────────────
  /api/v1/subscriber-usage:
    get:
      operationId: getSubscriberUsage
      tags: [Subscriber Usage]
      summary: Get subscriber usage data
      description: |
        Returns subscriber data usage (uplink, downlink, total bytes), grouped by day or by subscriber.
        Supports date range filtering and filtering by specific subscriber IMSI.
      parameters:
        - name: group_by
          in: query
          required: true
          schema:
            type: string
            enum: [day, subscriber]
          description: Group results by date or by subscriber IMSI.
        - name: start
          in: query
          schema:
            type: string
            format: date
          description: Start date (YYYY-MM-DD). Defaults to 7 days ago.
        - name: end
          in: query
          schema:
            type: string
            format: date
          description: End date (YYYY-MM-DD). Defaults to today.
        - name: subscriber
          in: query
          schema:
            type: string
          description: Filter to a specific subscriber IMSI.
      responses:
        "200":
          description: Usage data grouped by the requested dimension.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriberUsageResponseEnvelope"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
    delete:
      operationId: clearSubscriberUsage
      tags: [Subscriber Usage]
      summary: Clear all usage data
      description: Permanently deletes all subscriber usage records.
      responses:
        "200":
          $ref: "#/components/responses/Success"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/subscriber-usage/retention:
    get:
      operationId: getSubscriberUsageRetention
      tags: [Subscriber Usage]
      summary: Get usage retention policy
      description: Returns the number of days subscriber usage data is retained before automatic deletion.
      responses:
        "200":
          description: Retention policy.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RetentionPolicyResponseEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
    put:
      operationId: updateSubscriberUsageRetention
      tags: [Subscriber Usage]
      summary: Update usage retention policy
      description: Sets the number of days to retain subscriber usage data.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RetentionPolicyParams"
      responses:
        "200":
          $ref: "#/components/responses/Success"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ── Profiles ────────────────────────────────────────────────────────────
  /api/v1/profiles:
    get:
      operationId: listProfiles
      tags: [Profiles]
      summary: List profiles
      description: Returns a paginated list of all profiles. Profiles define UE-level aggregate maximum bit rates (UE-AMBR).
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PerPage"
      responses:
        "200":
          description: Paginated list of profiles.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListProfilesResponseEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: createProfile
      tags: [Profiles]
      summary: Create a profile
      description: |
        Creates a new profile with UE-AMBR settings.
        Maximum 12 profiles.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProfileParams"
      responses:
        "201":
          $ref: "#/components/responses/Success"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          $ref: "#/components/responses/Conflict"

  /api/v1/profiles/{name}:
    get:
      operationId: getProfile
      tags: [Profiles]
      summary: Get a profile
      description: Returns the details of a specific profile.
      parameters:
        - $ref: "#/components/parameters/ProfileNamePath"
      responses:
        "200":
          description: Profile details.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfileResponseEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      operationId: updateProfile
      tags: [Profiles]
      summary: Update a profile
      description: Updates the UE-AMBR settings of a profile.
      parameters:
        - $ref: "#/components/parameters/ProfileNamePath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileParams"
      responses:
        "200":
          $ref: "#/components/responses/Success"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteProfile
      tags: [Profiles]
      summary: Delete a profile
      description: Deletes a profile. Fails if any policies reference this profile.
      parameters:
        - $ref: "#/components/parameters/ProfileNamePath"
      responses:
        "200":
          $ref: "#/components/responses/Success"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  # ── Slices ──────────────────────────────────────────────────────────────
  /api/v1/slices:
    get:
      operationId: listSlices
      tags: [Slices]
      summary: List slices
      description: Returns a paginated list of all network slices. Each slice defines an S-NSSAI (SST and optional SD).
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PerPage"
      responses:
        "200":
          description: Paginated list of slices.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListSlicesResponseEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: createSlice
      tags: [Slices]
      summary: Create a slice
      description: |
        Creates a new network slice with the given SST and optional SD.
        The maximum number of slices is 8 (3GPP AllowedNSSAI limit).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSliceParams"
      responses:
        "201":
          $ref: "#/components/responses/Success"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          $ref: "#/components/responses/Conflict"

  /api/v1/slices/{name}:
    get:
      operationId: getSlice
      tags: [Slices]
      summary: Get a slice
      description: Returns the details of a specific network slice.
      parameters:
        - $ref: "#/components/parameters/SliceNamePath"
      responses:
        "200":
          description: Slice details.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SliceResponseEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      operationId: updateSlice
      tags: [Slices]
      summary: Update a slice
      description: Updates the SST and SD of a network slice.
      parameters:
        - $ref: "#/components/parameters/SliceNamePath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSliceParams"
      responses:
        "200":
          $ref: "#/components/responses/Success"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteSlice
      tags: [Slices]
      summary: Delete a slice
      description: Deletes a network slice. Fails if any policies reference this slice.
      parameters:
        - $ref: "#/components/parameters/SliceNamePath"
      responses:
        "200":
          $ref: "#/components/responses/Success"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  # ── Policies ────────────────────────────────────────────────────────────
  /api/v1/policies:
    get:
      operationId: listPolicies
      tags: [Policies]
      summary: List policies
      description: Returns a paginated list of all QoS policies. Policies bind a profile to a slice and data network, defining session AMBR, 5QI class, and allocation/retention priority.
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PerPage"
      responses:
        "200":
          description: Paginated list of policies.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListPoliciesResponseEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: createPolicy
      tags: [Policies]
      summary: Create a policy
      description: |
        Creates a new QoS policy. Requires a unique name, an existing profile, slice, and data network,
        session AMBR uplink/downlink limits, a 5QI value, and an ARP priority.
        Optionally supports an initial set of network rules organized by direction (uplink/downlink).
        Rules are created in the order they are provided.
        Maximum 12 policies.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePolicyParams"
      responses:
        "201":
          $ref: "#/components/responses/Success"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /api/v1/policies/{name}:
    get:
      operationId: getPolicy
      tags: [Policies]
      summary: Get a policy
      description: Returns the details of a specific QoS policy.
      parameters:
        - $ref: "#/components/parameters/PolicyNamePath"
      responses:
        "200":
          description: Policy details.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PolicyResponseEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      operationId: updatePolicy
      tags: [Policies]
      summary: Update a policy
      description: |
        Updates all fields of a QoS policy. Existing network rules are always replaced.

        - **Omit `rules`**: all existing rules are deleted.
        - **Provide `rules`**: existing rules are deleted and replaced with the new ones in the order given.
        - **Provide empty arrays**: all existing rules are deleted and no new rules are created.

        To keep existing rules you must explicitly include them in the request body.
      parameters:
        - $ref: "#/components/parameters/PolicyNamePath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePolicyParams"
      responses:
        "200":
          $ref: "#/components/responses/Success"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deletePolicy
      tags: [Policies]
      summary: Delete a policy
      description: Deletes a QoS policy.
      parameters:
        - $ref: "#/components/parameters/PolicyNamePath"
      responses:
        "200":
          $ref: "#/components/responses/Success"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  # ── Operator ────────────────────────────────────────────────────────────
  /api/v1/operator:
    get:
      operationId: getOperator
      tags: [Operator]
      summary: Get operator configuration
      description: Returns the full operator configuration including PLMN ID (MCC/MNC), network slice (SST/SD), tracking area codes, home network public keys, NAS security algorithms, and the Service Provider Name (SPN).
      responses:
        "200":
          description: Operator configuration.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OperatorResponseEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/operator/tracking:
    get:
      operationId: getOperatorTracking
      tags: [Operator]
      summary: Get tracking areas
      deprecated: true
      description: |
        **Deprecated** — use `GET /api/v1/operator` instead, which returns the full operator configuration including tracking data.
        This endpoint will be removed after 2026-04-01.
      responses:
        "200":
          description: Tracking area configuration.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OperatorTrackingResponseEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
    put:
      operationId: updateOperatorTracking
      tags: [Operator]
      summary: Update tracking areas
      description: Sets the list of supported Tracking Area Codes. Maximum 12 TACs. Each TAC is a 6-character hex string.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateOperatorTrackingParams"
      responses:
        "201":
          $ref: "#/components/responses/Success"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/operator/id:
    get:
      operationId: getOperatorId
      tags: [Operator]
      summary: Get PLMN ID
      deprecated: true
      description: |
        **Deprecated** — use `GET /api/v1/operator` instead, which returns the full operator configuration including the PLMN ID.
        This endpoint will be removed after 2026-04-01.
      responses:
        "200":
          description: PLMN ID.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OperatorIDResponseEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
    put:
      operationId: updateOperatorId
      tags: [Operator]
      summary: Update PLMN ID
      description: Changes the MCC and MNC. Cannot be changed while subscribers exist — delete all subscribers first.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateOperatorIDParams"
      responses:
        "201":
          $ref: "#/components/responses/Success"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/operator/code:
    put:
      operationId: updateOperatorCode
      tags: [Operator]
      summary: Update operator code
      description: Sets the operator code (OP). Cannot be changed while subscribers exist. The OPc for each subscriber is derived from this value and the subscriber's permanent key.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateOperatorCodeParams"
      responses:
        "201":
          $ref: "#/components/responses/Success"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/operator/home-network-keys:
    post:
      operationId: createHomeNetworkKey
      tags: [Operator]
      summary: Create a home network key
      description: |
        Adds a new home network key for SUCI de-concealment. The key is
        identified by a (keyIdentifier, scheme) pair. Profile A keys use
        Curve25519 (X25519); Profile B keys use NIST P-256. Maximum 12 keys.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateHomeNetworkKeyParams"
      responses:
        "201":
          $ref: "#/components/responses/Success"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          $ref: "#/components/responses/Conflict"

  /api/v1/operator/home-network-keys/{id}:
    delete:
      operationId: deleteHomeNetworkKey
      tags: [Operator]
      summary: Delete a home network key
      description: Removes a home network key. UEs using this key will no longer be able to register.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          $ref: "#/components/responses/Success"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/operator/home-network-keys/{id}/private-key:
    get:
      operationId: getHomeNetworkKeyPrivateKey
      tags: [Operator]
      summary: Get a home network key's private key
      description: |
        Returns the private key for a home network key. This is a sensitive
        operation and is recorded in the audit log. Only administrators and
        network managers can access this endpoint.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: The private key for the home network key.
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    $ref: "#/components/schemas/HomeNetworkKeyPrivateKeyResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/operator/nas-security:
    put:
      operationId: updateOperatorNASSecurity
      tags: [Operator]
      summary: Update NAS security algorithms
      description: |
        Sets the preferred NAS security algorithm order for ciphering and integrity
        protection. Each list must contain between 1 and 3 unique algorithm names.
        Allowed ciphering algorithms: NEA0, NEA1, NEA2.
        Allowed integrity algorithms: NIA0, NIA1, NIA2.
        The order determines preference during UE security capability negotiation.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateOperatorNASSecurityParams"
      responses:
        "201":
          $ref: "#/components/responses/Success"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/operator/spn:
    put:
      operationId: updateOperatorSPN
      tags: [Operator]
      summary: Update Service Provider Name (SPN)
      description: |
        Sets the full and short network names (Service Provider Name) displayed on
        connected devices. Both names are encoded in GSM 7-bit alphabet in the NAS
        Configuration Update Command. Changes take effect for the next UE registration.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateOperatorSPNParams"
      responses:
        "201":
          $ref: "#/components/responses/Success"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ── Data Networks ───────────────────────────────────────────────────────
  /api/v1/networking/data-networks:
    get:
      operationId: listDataNetworks
      tags: [Data Networks]
      summary: List data networks
      description: Returns a paginated list of data networks (DNNs). Each data network defines an IP pool, DNS server, and MTU for subscriber sessions.
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PerPage"
      responses:
        "200":
          description: Paginated list of data networks.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListDataNetworksResponseEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: createDataNetwork
      tags: [Data Networks]
      summary: Create a data network
      description: |
        Creates a new data network (DNN/APN). The name must be a valid DNN
        format (lowercase alphanumeric, hyphens, dots). Maximum 12 data networks.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDataNetworkParams"
      responses:
        "201":
          $ref: "#/components/responses/Success"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          $ref: "#/components/responses/Conflict"

  /api/v1/networking/data-networks/{name}:
    get:
      operationId: getDataNetwork
      tags: [Data Networks]
      summary: Get a data network
      description: Returns the configuration and active session count for a specific data network.
      parameters:
        - $ref: "#/components/parameters/DataNetworkNamePath"
      responses:
        "200":
          description: Data network details.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataNetworkResponseEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      operationId: updateDataNetwork
      tags: [Data Networks]
      summary: Update a data network
      description: Updates the IP pool, DNS, and MTU settings of a data network.
      parameters:
        - $ref: "#/components/parameters/DataNetworkNamePath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateDataNetworkParams"
      responses:
        "200":
          $ref: "#/components/responses/Success"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteDataNetwork
      tags: [Data Networks]
      summary: Delete a data network
      description: Deletes a data network. Fails if any QoS policies reference this data network.
      parameters:
        - $ref: "#/components/parameters/DataNetworkNamePath"
      responses:
        "200":
          $ref: "#/components/responses/Success"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /api/v1/networking/data-networks/{name}/ip-allocations:
    get:
      operationId: listIPAllocations
      tags: [Data Networks]
      summary: List IP allocations for a data network
      description: Returns a paginated list of IP address allocations (leases) for the specified data network.
      parameters:
        - $ref: "#/components/parameters/DataNetworkNamePath"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PerPage"
      responses:
        "200":
          description: Paginated list of IP allocations.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListIPAllocationsResponseEnvelope"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  # ── Routes ──────────────────────────────────────────────────────────────
  /api/v1/networking/routes:
    get:
      operationId: listRoutes
      tags: [Routes]
      summary: List routes
      description: Returns a paginated list of routes including both user-configured static routes and BGP-learned routes. Each route has a `source` field (`static` or `bgp`) indicating its origin.
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PerPage"
      responses:
        "200":
          description: Paginated list of routes.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListRoutesResponseEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: createRoute
      tags: [Routes]
      summary: Create a route
      description: |
        Adds a static IP route to both the database and the Linux kernel routing table.
        Maximum 12 routes. The interface must be `n3` or `n6`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRouteParams"
      responses:
        "201":
          description: Route created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateRouteResponseEnvelope"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/networking/routes/{id}:
    get:
      operationId: getRoute
      tags: [Routes]
      summary: Get a route
      description: Returns the details of a specific static route.
      parameters:
        - $ref: "#/components/parameters/RouteIdPath"
      responses:
        "200":
          description: Route details.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RouteResponseEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteRoute
      tags: [Routes]
      summary: Delete a route
      description: Removes a static route from the database and the Linux kernel routing table.
      parameters:
        - $ref: "#/components/parameters/RouteIdPath"
      responses:
        "200":
          $ref: "#/components/responses/Success"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  # ── NAT ─────────────────────────────────────────────────────────────────
  /api/v1/networking/nat:
    get:
      operationId: getNATInfo
      tags: [NAT]
      summary: Get NAT status
      description: Returns whether NAT (Network Address Translation) is currently enabled on the user plane.
      responses:
        "200":
          description: NAT status.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NATInfoResponseEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
    put:
      operationId: updateNATInfo
      tags: [NAT]
      summary: Enable or disable NAT
      description: Enables or disables NAT on the user plane. When enabled, subscriber traffic is NATed before leaving the N6 interface.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateNATInfoParams"
      responses:
        "200":
          $ref: "#/components/responses/Success"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ── BGP ─────────────────────────────────────────────────────────────────
  /api/v1/networking/bgp:
    get:
      operationId: getBGPSettings
      tags: [BGP]
      summary: Get BGP settings
      description: Returns the current BGP configuration.
      responses:
        "200":
          description: BGP settings and status.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BGPSettingsResponseEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
    put:
      operationId: updateBGPSettings
      tags: [BGP]
      summary: Update BGP settings
      description: >-
        Updates the BGP configuration. Enabling BGP starts the embedded BGP
        speaker; disabling it stops the speaker and withdraws all routes.
        Changing the local AS or router ID triggers a full restart. BGP and NAT
        can coexist — when NAT is enabled, the speaker runs but does not
        advertise subscriber routes.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateBGPSettingsParams"
      responses:
        "200":
          $ref: "#/components/responses/Success"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/networking/bgp/peers:
    get:
      operationId: listBGPPeers
      tags: [BGP]
      summary: List BGP peers
      description: Returns the paginated list of configured BGP peers with live session status.
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: per_page
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 25
      responses:
        "200":
          description: Paginated list of BGP peers.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListBGPPeersResponseEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: createBGPPeer
      tags: [BGP]
      summary: Create a BGP peer
      description: >-
        Adds a new BGP peer. If the BGP speaker is running, the peer is added
        to the live session immediately. A maximum of 5 peers are allowed.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBGPPeerParams"
      responses:
        "201":
          $ref: "#/components/responses/Success"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          $ref: "#/components/responses/Conflict"

  /api/v1/networking/bgp/peers/{id}:
    get:
      operationId: getBGPPeer
      tags: [BGP]
      summary: Get a BGP peer
      description: Returns a single BGP peer by ID with live session status and import prefix configuration.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: BGP peer details.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BGPPeerResponseEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      operationId: updateBGPPeer
      tags: [BGP]
      summary: Update a BGP peer
      description: >-
        Updates a BGP peer by ID. If the BGP speaker is running, the peer is
        reconfigured in the live session immediately.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateBGPPeerParams"
      responses:
        "200":
          $ref: "#/components/responses/Success"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
    delete:
      operationId: deleteBGPPeer
      tags: [BGP]
      summary: Delete a BGP peer
      description: >-
        Removes a BGP peer by ID. If the BGP speaker is running, the peer is
        removed from the live session immediately.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          $ref: "#/components/responses/Success"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/networking/bgp/advertised-routes:
    get:
      operationId: getBGPAdvertisedRoutes
      tags: [BGP]
      summary: Get advertised BGP routes
      description: Returns the list of routes currently advertised to BGP peers. These are /32 host routes derived from active PDU sessions.
      responses:
        "200":
          description: Advertised routes.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BGPAdvertisedRoutesResponseEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/networking/bgp/learned-routes:
    get:
      operationId: getBGPLearnedRoutes
      tags: [BGP]
      summary: Get learned BGP routes
      description: Returns the list of routes learned from BGP peers and installed in the kernel routing table.
      responses:
        "200":
          description: Learned routes.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BGPLearnedRoutesResponseEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ── Flow Accounting ─────────────────────────────────────────────────────
  /api/v1/networking/flow-accounting:
    get:
      operationId: getFlowAccountingInfo
      tags: [Flow Accounting]
      summary: Get flow accounting status
      description: Returns whether per-flow traffic accounting is currently enabled on the user plane.
      responses:
        "200":
          description: Flow accounting status.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FlowAccountingInfoResponseEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
    put:
      operationId: updateFlowAccountingInfo
      tags: [Flow Accounting]
      summary: Enable or disable flow accounting
      description: Enables or disables per-flow traffic accounting. When enabled, the user plane records per-flow traffic statistics accessible via the flow reports endpoints.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateFlowAccountingInfoParams"
      responses:
        "200":
          $ref: "#/components/responses/Success"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ── Interfaces ──────────────────────────────────────────────────────────
  /api/v1/networking/interfaces:
    get:
      operationId: listNetworkInterfaces
      tags: [Interfaces]
      summary: List network interfaces
      description: Returns the configuration of all network interfaces (N2 for control plane, N3 for user plane ingress, N6 for user plane egress, and the API interface).
      responses:
        "200":
          description: Interface configuration.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NetworkInterfacesResponseEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/networking/interfaces/n3:
    put:
      operationId: updateN3Interface
      tags: [Interfaces]
      summary: Update N3 interface settings
      description: Updates the external/advertised address of the N3 (GTP-U) interface. Set to empty string to use the default address.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateN3SettingsParams"
      responses:
        "200":
          $ref: "#/components/responses/Success"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ── Radios ──────────────────────────────────────────────────────────────
  /api/v1/ran/radios:
    get:
      operationId: listRadios
      tags: [Radios]
      summary: List connected radios
      description: Returns a paginated list of radio base stations (gNBs) currently connected to the AMF via NGAP. Includes their supported tracking areas and network slices.
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PerPage"
      responses:
        "200":
          description: Paginated list of radios.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListRadiosResponseEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/ran/radios/{name}:
    get:
      operationId: getRadio
      tags: [Radios]
      summary: Get a radio
      description: Returns the details of a specific connected radio base station.
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
          description: Radio name.
      responses:
        "200":
          description: Radio details.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RadioResponseEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  # ── Radio Events ────────────────────────────────────────────────────────
  /api/v1/ran/events:
    get:
      operationId: listRadioEvents
      tags: [Radio Events]
      summary: List radio events
      description: Returns a paginated, filterable list of NGAP protocol events between the core network and radio base stations.
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PerPage"
        - name: protocol
          in: query
          schema:
            type: string
          description: Filter by protocol name.
        - name: direction
          in: query
          schema:
            type: string
            enum: [inbound, outbound]
          description: Filter by message direction.
        - name: radio
          in: query
          schema:
            type: string
          description: Filter by radio name.
        - name: message_type
          in: query
          schema:
            type: string
          description: Filter by NGAP message type.
        - name: timestamp_from
          in: query
          schema:
            type: string
            format: date-time
          description: Filter events after this timestamp (RFC 3339).
        - name: timestamp_to
          in: query
          schema:
            type: string
            format: date-time
          description: Filter events before this timestamp (RFC 3339).
      responses:
        "200":
          description: Paginated list of radio events.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListRadioEventsResponseEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
    delete:
      operationId: clearRadioEvents
      tags: [Radio Events]
      summary: Clear all radio events
      description: Permanently deletes all recorded radio events.
      responses:
        "200":
          $ref: "#/components/responses/Success"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/ran/events/retention:
    get:
      operationId: getRadioEventRetention
      tags: [Radio Events]
      summary: Get radio event retention policy
      description: Returns the number of days radio events are retained before automatic deletion.
      responses:
        "200":
          description: Retention policy.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RetentionPolicyResponseEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
    put:
      operationId: updateRadioEventRetention
      tags: [Radio Events]
      summary: Update radio event retention policy
      description: Sets the number of days to retain radio events.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RetentionPolicyParams"
      responses:
        "200":
          $ref: "#/components/responses/Success"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/ran/events/{id}:
    get:
      operationId: getRadioEvent
      tags: [Radio Events]
      summary: Get a radio event
      description: Returns the raw bytes and decoded NGAP message of a specific radio event.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: Radio event ID.
      responses:
        "200":
          description: Radio event with decoded NGAP payload.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RadioEventDetailResponseEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  # ── Flow Reports ────────────────────────────────────────────────────────
  /api/v1/flow-reports:
    get:
      operationId: listFlowReports
      tags: [Flow Reports]
      summary: List flow reports
      description: |
        Returns per-flow traffic reports collected by the user plane. Supports filtering
        by subscriber, protocol, source/destination IP or port, direction, and date range.
        Can optionally group results by day or by subscriber.
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PerPage"
        - name: group_by
          in: query
          schema:
            type: string
            enum: [day, subscriber]
          description: Optionally group results by date or subscriber.
        - name: subscriber_id
          in: query
          schema:
            type: string
          description: Filter by subscriber IMSI.
        - name: protocol
          in: query
          schema:
            type: integer
            minimum: 0
            maximum: 255
          description: Filter by IP protocol number (e.g. 6 for TCP, 17 for UDP).
        - name: source
          in: query
          schema:
            type: string
          description: "Filter by source. Accepts: IP, IP:port, or :port."
        - name: destination
          in: query
          schema:
            type: string
          description: "Filter by destination. Accepts: IP, IP:port, or :port."
        - name: direction
          in: query
          schema:
            type: string
            enum: [uplink, downlink]
          description: Filter by traffic direction.
        - name: action
          in: query
          schema:
            type: string
            enum: [allow, drop]
          description: >
            Filter by flow action. `allow` returns only accepted flows,
            `drop` returns only dropped flows. When omitted, all flows are returned.
        - name: start
          in: query
          schema:
            type: string
            format: date
          description: Start date (YYYY-MM-DD). Defaults to 7 days ago.
        - name: end
          in: query
          schema:
            type: string
            format: date
          description: End date (YYYY-MM-DD). Defaults to today.
      responses:
        "200":
          description: Flow reports (flat list or grouped).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListFlowReportsResponseEnvelope"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
    delete:
      operationId: clearFlowReports
      tags: [Flow Reports]
      summary: Clear all flow reports
      description: Permanently deletes all flow report records.
      responses:
        "200":
          $ref: "#/components/responses/Success"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/flow-reports/retention:
    get:
      operationId: getFlowReportsRetention
      tags: [Flow Reports]
      summary: Get flow reports retention policy
      description: Returns the number of days flow reports are retained before automatic deletion.
      responses:
        "200":
          description: Retention policy.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RetentionPolicyResponseEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
    put:
      operationId: updateFlowReportsRetention
      tags: [Flow Reports]
      summary: Update flow reports retention policy
      description: Sets the number of days to retain flow reports.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RetentionPolicyParams"
      responses:
        "200":
          $ref: "#/components/responses/Success"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/flow-reports/stats:
    get:
      operationId: getFlowReportStats
      tags: [Flow Reports]
      summary: Get flow report statistics
      description: Returns aggregated statistics including top protocols and top uplink destination IPs. Accepts the same filters as the list endpoint.
      parameters:
        - name: subscriber_id
          in: query
          schema:
            type: string
        - name: protocol
          in: query
          schema:
            type: integer
        - name: source
          in: query
          schema:
            type: string
        - name: destination
          in: query
          schema:
            type: string
        - name: direction
          in: query
          schema:
            type: string
            enum: [uplink, downlink]
        - name: action
          in: query
          schema:
            type: string
            enum: [allow, drop]
          description: >
            Filter by flow action. `allow` returns only accepted flows,
            `drop` returns only dropped flows. When omitted, all flows are returned.
        - name: start
          in: query
          schema:
            type: string
            format: date
        - name: end
          in: query
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Aggregated flow statistics.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FlowReportStatsResponseEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ── Audit Logs ──────────────────────────────────────────────────────────
  /api/v1/logs/audit:
    get:
      operationId: listAuditLogs
      tags: [Audit Logs]
      summary: List audit logs
      description: Returns a paginated list of audit log entries recording administrative actions (user logins, configuration changes, etc.).
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PerPage"
        - name: user
          in: query
          required: false
          schema:
            type: string
          description: Filter audit logs by user email. When omitted, all audit logs are returned.
        - name: action
          in: query
          required: false
          schema:
            type: string
          description: Filter audit logs by action identifier (e.g. create_subscriber, auth_login). When omitted, all actions are returned.
        - name: start
          in: query
          schema:
            type: string
            format: date
          description: Start date (YYYY-MM-DD). Defaults to 7 days ago.
        - name: end
          in: query
          schema:
            type: string
            format: date
          description: End date (YYYY-MM-DD). Defaults to today.
      responses:
        "200":
          description: Paginated list of audit log entries.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAuditLogsResponseEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/logs/audit/retention:
    get:
      operationId: getAuditLogRetention
      tags: [Audit Logs]
      summary: Get audit log retention policy
      description: Returns the number of days audit logs are retained before automatic deletion.
      responses:
        "200":
          description: Retention policy.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RetentionPolicyResponseEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
    put:
      operationId: updateAuditLogRetention
      tags: [Audit Logs]
      summary: Update audit log retention policy
      description: Sets the number of days to retain audit logs.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RetentionPolicyParams"
      responses:
        "200":
          $ref: "#/components/responses/Success"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ── Backup & Restore ────────────────────────────────────────────────────
  /api/v1/backup:
    post:
      operationId: createBackup
      tags: [Backup & Restore]
      summary: Create a database backup
      description: |
        Downloads a complete backup of the Ella Core database as a gzipped tar
        archive (`.tar.gz`) containing `ella.db` and a `manifest.json`
        describing the backup format version.
      responses:
        "200":
          description: Database backup archive.
          content:
            application/gzip:
              schema:
                type: string
                format: binary
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/restore:
    post:
      operationId: restoreBackup
      tags: [Backup & Restore]
      summary: Restore from backup
      description: |
        Restores the Ella Core database from an uploaded `.tar.gz` archive
        produced by `POST /api/v1/backup`. The archive must contain `ella.db`
        and `manifest.json`. The database is swapped atomically: a safety
        copy of the live database is taken before the swap, and a failure
        at any step rolls the file back. Maximum upload size: 256 MB.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [backup]
              properties:
                backup:
                  type: string
                  format: binary
                  description: The database backup tar.gz archive.
      responses:
        "200":
          $ref: "#/components/responses/Success"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ── Support Bundle ──────────────────────────────────────────────────────
  /api/v1/support-bundle:
    post:
      operationId: createSupportBundle
      tags: [Support Bundle]
      summary: Generate a support bundle
      description: Generates and downloads a gzipped tar archive containing diagnostic information for troubleshooting.
      responses:
        "200":
          description: Support bundle archive.
          content:
            application/gzip:
              schema:
                type: string
                format: binary
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ── Cluster ───────────────────────────────────────────────────────────
  /api/v1/cluster/members:
    get:
      operationId: listClusterMembers
      tags: [Cluster]
      summary: List cluster members
      description: >-
        Returns all registered cluster members. Returns an empty array
        when clustering is disabled. Requires admin privileges.
      responses:
        "200":
          description: List of cluster members.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListClusterMembersResponseEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: addClusterMember
      tags: [Cluster]
      summary: Add a cluster member
      description: >-
        Adds a new node to the Raft cluster and registers it in the cluster
        members table. The node must already be running and reachable at the
        given raft address. Requires admin privileges.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddClusterMemberParams"
      responses:
        "201":
          $ref: "#/components/responses/Success"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/cluster/members/{id}:
    get:
      operationId: getClusterMember
      tags: [Cluster]
      summary: Get a cluster member
      description: Returns a single cluster member by node ID. Requires admin privileges.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: Node ID of the cluster member.
      responses:
        "200":
          description: Cluster member.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetClusterMemberResponseEnvelope"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: removeClusterMember
      tags: [Cluster]
      summary: Remove a cluster member
      description: >-
        Removes a node from the Raft cluster and deletes its cluster_members
        record. The node must be drained first (`drainState == "drained"`)
        or the caller must pass `force=true`. The node should be shut down
        after removal. Requires admin privileges.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: Node ID of the cluster member to remove.
        - name: force
          in: query
          required: false
          schema:
            type: boolean
          description: >-
            Bypass the drain precondition. Use only when the drain endpoint
            cannot reach the target (e.g. the node is already down).
      responses:
        "200":
          $ref: "#/components/responses/Success"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /api/v1/cluster/members/{id}/promote:
    post:
      operationId: promoteClusterMember
      tags: [Cluster]
      summary: Promote a nonvoter to voter
      description: >-
        Promotes a nonvoter cluster member to a full voter in the Raft cluster.
        Autopilot also promotes stable non-voters automatically after the
        server stabilization window (10 seconds); this endpoint lets
        operators promote immediately without waiting. Requires admin
        privileges.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: Node ID of the cluster member to promote.
      responses:
        "200":
          $ref: "#/components/responses/Success"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /api/v1/cluster/autopilot:
    get:
      operationId: getAutopilotState
      tags: [Cluster]
      summary: Get the current autopilot state
      description: >-
        Returns the live autopilot view of the cluster: per-peer health and
        replication lag, voter/nonvoter roster, and cluster-wide
        `failureTolerance`. Autopilot runs only on the leader, so requests
        on a follower are proxied to the leader over the cluster port.
        Immediately after a leadership change, the leader may return an
        empty state for a short window (typically under one second) until
        its first autopilot tick publishes a state. Requires admin
        privileges.
      responses:
        "200":
          description: Autopilot state.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AutopilotStateResponseEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "502":
          description: Proxy to leader failed; try again.
        "503":
          description: No leader is currently available; try again.

  /api/v1/cluster/members/{id}/drain:
    post:
      operationId: drainClusterMember
      tags: [Cluster]
      summary: Drain a specific cluster member
      description: >-
        Persists `drainState=draining` on the target node and runs the drain
        side-effects on that node: transfers Raft leadership (if the target is
        the leader), signals RANs that the node's GUAMI is unavailable (AMF
        Status Indication, TS 38.413), and stops the local BGP speaker. The
        target continues serving existing flows until removed or shut down.

        When `deadlineSeconds` is 0 (the default), the response returns only
        after the drain completes and `state` is `"drained"`. When
        `deadlineSeconds > 0` the call returns immediately with
        `state: "draining"`; a background watcher on the leader flips the
        state to `"drained"` once the target's active-lease count reaches
        zero or the deadline elapses. Idempotent: re-draining a draining or
        drained node returns the current state without re-running
        side-effects.

        In HA mode, drain runs on the leader (followers forward the request
        automatically). The leader persists drain state through Raft and
        dispatches the node-local side-effects to the target node over the
        cluster mTLS port; when the target is the leader itself, the
        side-effects run inline. Requires admin privileges.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: Node ID of the cluster member to drain.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DrainParams"
      responses:
        "200":
          description: Drain result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DrainResponseEnvelope"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "502":
          description: Target node unreachable (proxy failure).

  /api/v1/cluster/members/{id}/resume:
    post:
      operationId: resumeClusterMember
      tags: [Cluster]
      summary: Resume a drained cluster member
      description: >-
        Reverses drain on the target node: restarts the local BGP speaker
        (if BGP is globally enabled) and clears `drainState` back to
        `"active"`. Does not reverse AMF Status Indication (a new NG Setup
        on RAN reconnection re-establishes the GUAMI) and does not reclaim
        Raft leadership transferred during drain. Idempotent: resuming a
        non-drained node is a no-op. Requires admin privileges.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: Node ID of the cluster member to resume.
      responses:
        "200":
          description: Resume result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResumeResponseEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "502":
          description: Target node unreachable (proxy failure).

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: "JWT token from login or API token (prefixed `ellacore_`)."

  parameters:
    Page:
      name: page
      in: query
      schema:
        type: integer
        default: 1
        minimum: 1
      description: Page number.
    PerPage:
      name: per_page
      in: query
      schema:
        type: integer
        default: 25
        minimum: 1
        maximum: 100
      description: Items per page.
    EmailPath:
      name: email
      in: path
      required: true
      schema:
        type: string
        format: email
      description: User email address.
    ImsiPath:
      name: imsi
      in: path
      required: true
      schema:
        type: string
        pattern: "^[0-9]{15}$"
      description: "15-digit IMSI (International Mobile Subscriber Identity)."
    PolicyNamePath:
      name: name
      in: path
      required: true
      schema:
        type: string
      description: Policy name.
    ProfileNamePath:
      name: name
      in: path
      required: true
      schema:
        type: string
      description: Profile name.
    SliceNamePath:
      name: name
      in: path
      required: true
      schema:
        type: string
      description: Slice name.
    DataNetworkNamePath:
      name: name
      in: path
      required: true
      schema:
        type: string
      description: Data network name (DNN).
    RouteIdPath:
      name: id
      in: path
      required: true
      schema:
        type: integer
        format: int64
      description: Route ID.

  responses:
    Success:
      description: Operation succeeded.
      content:
        application/json:
          schema:
            type: object
            properties:
              result:
                $ref: "#/components/schemas/SuccessResponse"
    BadRequest:
      description: Invalid request parameters.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: Missing or invalid authentication token.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: Insufficient permissions.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Conflict:
      description: Resource already exists or is in use.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    InternalError:
      description: Internal server error.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    # ── Common ──────────────────────────────────────────────────────────
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required: [error]

    SuccessResponse:
      type: object
      properties:
        message:
          type: string
      required: [message]

    CreateSuccessResponse:
      type: object
      properties:
        message:
          type: string
        id:
          type: integer
          format: int64
      required: [message, id]

    RetentionPolicyParams:
      type: object
      required: [days]
      properties:
        days:
          type: integer
          minimum: 1
          description: Number of days to retain data.

    RetentionPolicy:
      type: object
      properties:
        days:
          type: integer
      required: [days]

    RetentionPolicyResponseEnvelope:
      type: object
      properties:
        result:
          $ref: "#/components/schemas/RetentionPolicy"

    # ── Status ──────────────────────────────────────────────────────────
    StatusResponse:
      type: object
      properties:
        version:
          type: string
          description: Software version.
        revision:
          type: string
          description: Git commit hash.
        initialized:
          type: boolean
          description: True if the system has at least one user.
        ready:
          type: boolean
          description: True if the node has completed full startup and can serve the complete API.
        schemaVersion:
          type: integer
          description: >-
            Shared-database schema version this node's binary expects.
            Reported in both standalone and HA modes.
        cluster:
          $ref: "#/components/schemas/ClusterStatus"
      required: [version, revision, initialized, ready, schemaVersion]

    StatusResponseEnvelope:
      type: object
      properties:
        result:
          $ref: "#/components/schemas/StatusResponse"

    # ── Initialization ──────────────────────────────────────────────────
    InitializeParams:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    InitializeResponse:
      type: object
      properties:
        message:
          type: string
        token:
          type: string
          description: JWT token.
      required: [message, token]

    InitializeResponseEnvelope:
      type: object
      properties:
        result:
          $ref: "#/components/schemas/InitializeResponse"

    # ── Authentication ──────────────────────────────────────────────────
    LoginParams:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    LoginResponse:
      type: object
      properties:
        message:
          type: string
        token:
          type: string
          description: JWT token (15-minute expiry).
      required: [message, token]

    LoginResponseEnvelope:
      type: object
      properties:
        result:
          $ref: "#/components/schemas/LoginResponse"

    RefreshResponse:
      type: object
      properties:
        token:
          type: string
      required: [token]

    RefreshResponseEnvelope:
      type: object
      properties:
        result:
          $ref: "#/components/schemas/RefreshResponse"

    LookupTokenResponse:
      type: object
      properties:
        valid:
          type: boolean
      required: [valid]

    LookupTokenResponseEnvelope:
      type: object
      properties:
        result:
          $ref: "#/components/schemas/LookupTokenResponse"

    RotateSecretResponse:
      type: object
      properties:
        message:
          type: string
      required: [message]

    RotateSecretResponseEnvelope:
      type: object
      properties:
        result:
          $ref: "#/components/schemas/RotateSecretResponse"

    # ── Users ───────────────────────────────────────────────────────────
    User:
      type: object
      properties:
        email:
          type: string
          format: email
        role_id:
          type: integer
          description: "1 = Admin, 2 = ReadOnly, 3 = NetworkManager."
          enum: [1, 2, 3]
      required: [email, role_id]

    UserResponseEnvelope:
      type: object
      properties:
        result:
          $ref: "#/components/schemas/User"

    ListUsersResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/User"
        page:
          type: integer
        per_page:
          type: integer
        total_count:
          type: integer
      required: [items, page, per_page, total_count]

    ListUsersResponseEnvelope:
      type: object
      properties:
        result:
          $ref: "#/components/schemas/ListUsersResponse"

    CreateUserParams:
      type: object
      required: [email, password, role_id]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
        role_id:
          type: integer
          description: "1 = Admin, 2 = ReadOnly, 3 = NetworkManager."
          enum: [1, 2, 3]

    UpdateUserParams:
      type: object
      required: [role_id]
      properties:
        role_id:
          type: integer
          enum: [1, 2, 3]

    UpdatePasswordParams:
      type: object
      required: [password]
      properties:
        password:
          type: string

    UpdateMyPasswordParams:
      type: object
      required: [current_password, password]
      properties:
        current_password:
          type: string
          description: The user's current password, required for verification.
        password:
          type: string
          description: The new password to set.

    APIToken:
      type: object
      properties:
        id:
          type: string
          description: Token ID (not the secret).
        name:
          type: string
        expires_at:
          type: string
          description: Expiration time (RFC 3339) or empty if no expiry.
      required: [id, name]

    ListAPITokensResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/APIToken"
        page:
          type: integer
        per_page:
          type: integer
        total_count:
          type: integer
      required: [items, page, per_page, total_count]

    ListAPITokensResponseEnvelope:
      type: object
      properties:
        result:
          $ref: "#/components/schemas/ListAPITokensResponse"

    CreateAPITokenParams:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 3
          maxLength: 50
          description: A human-readable name for the token.
        expires_at:
          type: string
          format: date-time
          description: Optional expiration time (RFC 3339). Must be in the future.

    CreateAPITokenResponse:
      type: object
      properties:
        token:
          type: string
          description: "Full API token string (prefixed `ellacore_`). Store securely — it cannot be retrieved again."
      required: [token]

    CreateAPITokenResponseEnvelope:
      type: object
      properties:
        result:
          $ref: "#/components/schemas/CreateAPITokenResponse"

    # ── Subscribers ─────────────────────────────────────────────────────
    SubscriberStatus:
      type: object
      properties:
        registered:
          type: boolean
          description: Whether the device is currently registered on the network.
        num_pdu_sessions:
          type: integer
          description: Number of active PDU sessions for this subscriber.
        lastSeenAt:
          type: string
          format: date-time
          description: Timestamp when the subscriber was last seen (RFC 3339). Omitted if never seen.
      required: [registered, num_pdu_sessions]

    Subscriber:
      type: object
      properties:
        imsi:
          type: string
          description: "15-digit International Mobile Subscriber Identity."
        profile_name:
          type: string
          description: Name of the assigned profile.
        radio:
          type: string
          description: Radio name the subscriber is connected through (empty if not connected).
        status:
          $ref: "#/components/schemas/SubscriberStatus"
      required: [imsi, profile_name, status]

    ListSubscribersResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Subscriber"
        page:
          type: integer
        per_page:
          type: integer
        total_count:
          type: integer
      required: [items, page, per_page, total_count]

    ListSubscribersResponseEnvelope:
      type: object
      properties:
        result:
          $ref: "#/components/schemas/ListSubscribersResponse"

    SubscriberDetailStatus:
      type: object
      properties:
        registered:
          type: boolean
        imei:
          type: string
          description: IMEI of the connected device.
        cipheringAlgorithm:
          type: string
          description: Negotiated ciphering algorithm.
        integrityAlgorithm:
          type: string
          description: Negotiated integrity algorithm.
        lastSeenAt:
          type: string
          description: Timestamp of last activity (RFC 3339).
        lastSeenRadio:
          type: string
          description: Name of the radio the device was last seen on.
      required: [registered, imei, cipheringAlgorithm, integrityAlgorithm]

    SubscriberDetail:
      type: object
      properties:
        imsi:
          type: string
        profile_name:
          type: string
        status:
          $ref: "#/components/schemas/SubscriberDetailStatus"
        pdu_sessions:
          type: array
          description: "List of active PDU sessions for this subscriber."
          items:
            $ref: "#/components/schemas/SessionInfo"
      required: [imsi, profile_name, status]

    SubscriberCredentials:
      type: object
      properties:
        key:
          type: string
          description: "32-character hex permanent key (K)."
        opc:
          type: string
          description: "32-character hex OPc value."
        sequenceNumber:
          type: string
          description: "Sequence number (6-byte hex)."
      required: [key, opc, sequenceNumber]

    SubscriberCredentialsResponseEnvelope:
      type: object
      properties:
        result:
          $ref: "#/components/schemas/SubscriberCredentials"

    SubscriberDetailResponseEnvelope:
      type: object
      properties:
        result:
          $ref: "#/components/schemas/SubscriberDetail"

    SessionInfo:
      type: object
      description: "PDU session information returned with a subscriber detail."
      properties:
        pdu_session_id:
          type: integer
          description: "PDU session identifier."
        status:
          type: string
          description: "PDU session status (e.g. active, inactive)."
        ipAddress:
          type: string
          description: "Assigned IP address for this PDU session. May be omitted if unknown."
        dnn:
          type: string
          description: "Data network name for this PDU session."
        sst:
          type: integer
          description: "Slice/Service Type (SST) for this PDU session."
        sd:
          type: string
          description: "Slice Differentiator (SD). Omitted when not set."
        session_ambr_uplink:
          type: string
          description: "Effective uplink session AMBR (e.g. \"100 Mbps\")."
        session_ambr_downlink:
          type: string
          description: "Effective downlink session AMBR (e.g. \"200 Mbps\")."
      required: [pdu_session_id, status]

    CreateSubscriberParams:
      type: object
      required: [imsi, key, sequenceNumber, profile_name]
      properties:
        imsi:
          type: string
          pattern: "^[0-9]{15}$"
          description: "15-digit IMSI. Must start with the operator's MCC+MNC."
        key:
          type: string
          pattern: "^[0-9a-fA-F]{32}$"
          description: "32-character hex permanent key (K)."
        opc:
          type: string
          pattern: "^[0-9a-fA-F]{32}$"
          description: "32-character hex OPc. If omitted, derived from the operator code."
        sequenceNumber:
          type: string
          description: "6-byte hex sequence number."
        profile_name:
          type: string
          description: Name of an existing profile.

    UpdateSubscriberParams:
      type: object
      required: [profile_name]
      properties:
        profile_name:
          type: string
          description: Name of an existing profile.

    # ── Subscriber Usage ────────────────────────────────────────────────
    SubscriberUsage:
      type: object
      properties:
        uplink_bytes:
          type: integer
          format: int64
        downlink_bytes:
          type: integer
          format: int64
        total_bytes:
          type: integer
          format: int64
      required: [uplink_bytes, downlink_bytes, total_bytes]

    SubscriberUsageResponseEnvelope:
      type: object
      properties:
        result:
          type: array
          description: "Array of single-key objects. Each key is a date (YYYY-MM-DD) when group_by=day, or an IMSI string when group_by=subscriber. The value is a usage summary."
          items:
            type: object
            additionalProperties:
              $ref: "#/components/schemas/SubscriberUsage"

    # ── Policies ────────────────────────────────────────────────────────
    PolicyRule:
      type: object
      properties:
        description:
          type: string
        remote_prefix:
          type: string
          nullable: true
          description: "CIDR notation (e.g. \"10.0.0.0/24\") or null."
        protocol:
          type: integer
          description: "Protocol number (0-255)."
        port_low:
          type: integer
          description: "Low port number (0-65535)."
        port_high:
          type: integer
          description: "High port number (0-65535)."
        action:
          type: string
          enum: [allow, deny]
      required: [description, protocol, port_low, port_high, action]

    PolicyRules:
      type: object
      properties:
        uplink:
          type: array
          items:
            $ref: "#/components/schemas/PolicyRule"
          description: "List of uplink rules in order."
        downlink:
          type: array
          items:
            $ref: "#/components/schemas/PolicyRule"
          description: "List of downlink rules in order."

    Policy:
      type: object
      properties:
        name:
          type: string
        profile_name:
          type: string
          description: Name of the profile this policy belongs to.
        slice_name:
          type: string
          description: Name of the network slice this policy applies to.
        session_ambr_uplink:
          type: string
          description: "Maximum uplink bitrate for a single PDU session (Session AMBR). Enforced by Ella Core. Example: \"100 Mbps\"."
        session_ambr_downlink:
          type: string
          description: "Maximum downlink bitrate for a single PDU session (Session AMBR). Enforced by Ella Core. Example: \"200 Mbps\"."
        var5qi:
          type: integer
          description: "5G QoS Identifier. Signaled to the radio, which uses it for scheduling (latency budget, error rate, priority). Non-GBR values only."
          enum: [5, 6, 7, 8, 9, 69, 70, 79, 80]
        arp:
          type: integer
          description: "Allocation and Retention Priority (1–15). Used by the radio at session setup for admission control and pre-emption decisions. Has no effect on traffic once admitted."
          minimum: 1
          maximum: 15
        data_network_name:
          type: string
          description: Name of the data network this policy applies to.
        rules:
          $ref: "#/components/schemas/PolicyRules"
          nullable: true
          description: "Optional network rules organized by direction (uplink/downlink)."
      required: [name, profile_name, slice_name, session_ambr_uplink, session_ambr_downlink, var5qi, arp, data_network_name]

    PolicyResponseEnvelope:
      type: object
      properties:
        result:
          $ref: "#/components/schemas/Policy"

    ListPoliciesResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Policy"
        page:
          type: integer
        per_page:
          type: integer
        total_count:
          type: integer
      required: [items, page, per_page, total_count]

    ListPoliciesResponseEnvelope:
      type: object
      properties:
        result:
          $ref: "#/components/schemas/ListPoliciesResponse"

    CreatePolicyParams:
      type: object
      required: [name, profile_name, slice_name, data_network_name, session_ambr_uplink, session_ambr_downlink, var5qi, arp]
      properties:
        name:
          type: string
          maxLength: 255
        profile_name:
          type: string
          description: Name of an existing profile.
        slice_name:
          type: string
          description: Name of an existing network slice.
        data_network_name:
          type: string
          description: Name of an existing data network.
        session_ambr_uplink:
          type: string
          description: "e.g. \"100 Mbps\""
        session_ambr_downlink:
          type: string
          description: "e.g. \"200 Mbps\""
        var5qi:
          type: integer
          description: "5G QoS Identifier. Signaled to the radio for scheduling. Non-GBR values only."
          enum: [5, 6, 7, 8, 9, 69, 70, 79, 80]
        arp:
          type: integer
          description: "Allocation and Retention Priority (1–15). Admission control at session setup."
          minimum: 1
          maximum: 15
        rules:
          $ref: "#/components/schemas/PolicyRules"
          description: "Optional network rules to be created with the policy."

    UpdatePolicyParams:
      type: object
      required: [profile_name, slice_name, data_network_name, session_ambr_uplink, session_ambr_downlink, var5qi, arp]
      properties:
        profile_name:
          type: string
          description: Name of an existing profile.
        slice_name:
          type: string
          description: Name of an existing network slice.
        data_network_name:
          type: string
          description: Name of an existing data network.
        session_ambr_uplink:
          type: string
          description: "e.g. \"100 Mbps\""
        session_ambr_downlink:
          type: string
          description: "e.g. \"200 Mbps\""
        var5qi:
          type: integer
          description: "5G QoS Identifier. Signaled to the radio for scheduling. Non-GBR values only."
          enum: [5, 6, 7, 8, 9, 69, 70, 79, 80]
        arp:
          type: integer
          description: "Allocation and Retention Priority (1–15). Admission control at session setup."
          minimum: 1
          maximum: 15
        rules:
          $ref: "#/components/schemas/PolicyRules"
          description: |
            Network rules to set on the policy. Existing rules are always deleted first.
            If this field is omitted, all existing rules are deleted.
            To keep existing rules, you must re-supply them in every update request.

    # ── Profiles ────────────────────────────────────────────────────────
    Profile:
      type: object
      properties:
        name:
          type: string
        ue_ambr_uplink:
          type: string
          description: "Aggregate uplink bitrate cap across all of the subscriber's sessions (UE-AMBR). Enforced by the radio. Example: \"1 Gbps\"."
        ue_ambr_downlink:
          type: string
          description: "Aggregate downlink bitrate cap across all of the subscriber's sessions (UE-AMBR). Enforced by the radio. Example: \"1 Gbps\"."
      required: [name, ue_ambr_uplink, ue_ambr_downlink]

    ProfileResponseEnvelope:
      type: object
      properties:
        result:
          $ref: "#/components/schemas/Profile"

    ListProfilesResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Profile"
        page:
          type: integer
        per_page:
          type: integer
        total_count:
          type: integer
      required: [items, page, per_page, total_count]

    ListProfilesResponseEnvelope:
      type: object
      properties:
        result:
          $ref: "#/components/schemas/ListProfilesResponse"

    CreateProfileParams:
      type: object
      required: [name, ue_ambr_uplink, ue_ambr_downlink]
      properties:
        name:
          type: string
          maxLength: 255
        ue_ambr_uplink:
          type: string
          description: "e.g. \"1 Gbps\""
        ue_ambr_downlink:
          type: string
          description: "e.g. \"1 Gbps\""

    UpdateProfileParams:
      type: object
      required: [ue_ambr_uplink, ue_ambr_downlink]
      properties:
        ue_ambr_uplink:
          type: string
          description: "e.g. \"1 Gbps\""
        ue_ambr_downlink:
          type: string
          description: "e.g. \"1 Gbps\""

    # ── Slices ──────────────────────────────────────────────────────────
    Slice:
      type: object
      properties:
        name:
          type: string
        sst:
          type: integer
          description: "Slice/Service Type (0-255)."
          minimum: 0
          maximum: 255
        sd:
          type: string
          description: "Slice Differentiator (up to 6 hex chars). Omitted when empty."
      required: [name, sst]

    SliceResponseEnvelope:
      type: object
      properties:
        result:
          $ref: "#/components/schemas/Slice"

    ListSlicesResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Slice"
        page:
          type: integer
        per_page:
          type: integer
        total_count:
          type: integer
      required: [items, page, per_page, total_count]

    ListSlicesResponseEnvelope:
      type: object
      properties:
        result:
          $ref: "#/components/schemas/ListSlicesResponse"

    CreateSliceParams:
      type: object
      required: [name, sst]
      properties:
        name:
          type: string
          maxLength: 255
        sst:
          type: integer
          minimum: 0
          maximum: 255
        sd:
          type: string
          maxLength: 6
          description: "Optional Slice Differentiator (hex)."

    UpdateSliceParams:
      type: object
      required: [sst]
      properties:
        sst:
          type: integer
          minimum: 0
          maximum: 255
        sd:
          type: string
          maxLength: 6
          description: "Optional Slice Differentiator (hex)."

    # ── Operator ────────────────────────────────────────────────────────
    OperatorID:
      type: object
      properties:
        mcc:
          type: string
          description: "Mobile Country Code (3 digits)."
        mnc:
          type: string
          description: "Mobile Network Code (2-3 digits)."
      required: [mcc, mnc]

    OperatorTracking:
      type: object
      properties:
        supportedTacs:
          type: array
          items:
            type: string
          description: "List of 6-character hex Tracking Area Codes."
      required: [supportedTacs]

    OperatorResponse:
      type: object
      properties:
        id:
          $ref: "#/components/schemas/OperatorID"
        tracking:
          $ref: "#/components/schemas/OperatorTracking"
        homeNetworkKeys:
          type: array
          items:
            $ref: "#/components/schemas/HomeNetworkKeyResponse"
        nasSecurity:
          $ref: "#/components/schemas/OperatorNASSecurity"
        spn:
          $ref: "#/components/schemas/OperatorSPN"

    OperatorResponseEnvelope:
      type: object
      properties:
        result:
          $ref: "#/components/schemas/OperatorResponse"

    OperatorTrackingResponseEnvelope:
      type: object
      properties:
        result:
          $ref: "#/components/schemas/OperatorTracking"

    OperatorIDResponseEnvelope:
      type: object
      properties:
        result:
          $ref: "#/components/schemas/OperatorID"

    UpdateOperatorTrackingParams:
      type: object
      required: [supportedTacs]
      properties:
        supportedTacs:
          type: array
          maxItems: 12
          items:
            type: string
            pattern: "^[0-9a-fA-F]{6}$"

    UpdateOperatorIDParams:
      type: object
      required: [mcc, mnc]
      properties:
        mcc:
          type: string
          pattern: "^[0-9]{3}$"
          description: "3-digit Mobile Country Code."
        mnc:
          type: string
          pattern: "^[0-9]{2,3}$"
          description: "2 or 3-digit Mobile Network Code."

    UpdateOperatorCodeParams:
      type: object
      required: [operatorCode]
      properties:
        operatorCode:
          type: string
          pattern: "^[0-9a-fA-F]{32}$"
          description: "32-character hex operator code (OP)."

    HomeNetworkKeyResponse:
      type: object
      properties:
        id:
          type: integer
          description: Internal database ID.
        keyIdentifier:
          type: integer
          minimum: 0
          maximum: 255
          description: Home Network Public Key Identifier (as used in SUCI).
        scheme:
          type: string
          enum: [A, B]
          description: '"A" for Curve25519 (X25519), "B" for NIST P-256.'
        publicKey:
          type: string
          description: Derived public key in hex. Profile A = 64 chars, Profile B = 66 chars (compressed).

    CreateHomeNetworkKeyParams:
      type: object
      required: [keyIdentifier, scheme, privateKey]
      properties:
        keyIdentifier:
          type: integer
          minimum: 0
          maximum: 255
        scheme:
          type: string
          enum: [A, B]
        privateKey:
          type: string
          pattern: "^[0-9a-fA-F]{64}$"
          description: "64-character hex private key. Curve25519 for scheme A, P-256 for scheme B."

    HomeNetworkKeyPrivateKeyResponse:
      type: object
      properties:
        privateKey:
          type: string
          description: "64-character hex private key."

    UpdateOperatorNASSecurityParams:
      type: object
      required: [ciphering, integrity]
      properties:
        ciphering:
          type: array
          minItems: 1
          maxItems: 3
          uniqueItems: true
          items:
            type: string
            enum: [NEA0, NEA1, NEA2]
          description: "Preferred ciphering algorithm order."
        integrity:
          type: array
          minItems: 1
          maxItems: 3
          uniqueItems: true
          items:
            type: string
            enum: [NIA0, NIA1, NIA2]
          description: "Preferred integrity algorithm order."

    OperatorNASSecurity:
      type: object
      properties:
        ciphering:
          type: array
          items:
            type: string
            enum: [NEA0, NEA1, NEA2]
          description: "Current ciphering algorithm preference order."
        integrity:
          type: array
          items:
            type: string
            enum: [NIA0, NIA1, NIA2]
          description: "Current integrity algorithm preference order."

    OperatorSPN:
      type: object
      properties:
        fullName:
          type: string
          description: "Full network name shown on UE displays."
        shortName:
          type: string
          description: "Abbreviated network name shown on UE displays."

    UpdateOperatorSPNParams:
      type: object
      required: [fullName, shortName]
      properties:
        fullName:
          type: string
          minLength: 1
          maxLength: 50
          description: "Full network name. Must be printable ASCII (GSM 7-bit compatible)."
        shortName:
          type: string
          minLength: 1
          maxLength: 50
          description: "Abbreviated network name. Must be printable ASCII (GSM 7-bit compatible)."

    # ── Data Networks ───────────────────────────────────────────────────
    DataNetworkStatus:
      type: object
      properties:
        sessions:
          type: integer
          description: Number of active PDU sessions on this data network.
      required: [sessions]

    DataNetworkIPAllocation:
      type: object
      properties:
        pool_size:
          type: integer
          description: Total number of usable IP addresses in the pool.
        allocated:
          type: integer
          description: Number of currently allocated (leased) addresses.
        available:
          type: integer
          description: Number of addresses still available for allocation.
      required: [pool_size, allocated, available]

    DataNetwork:
      type: object
      properties:
        name:
          type: string
        ip_pool:
          type: string
          description: "IP pool in CIDR notation."
        dns:
          type: string
          description: DNS server IP address.
        mtu:
          type: integer
          description: "Maximum Transmission Unit (0-65535)."
        status:
          $ref: "#/components/schemas/DataNetworkStatus"
        ip_allocation:
          $ref: "#/components/schemas/DataNetworkIPAllocation"
          description: IP pool utilization statistics. Present only in the detail response.
      required: [name, ip_pool, dns, mtu, status]

    DataNetworkResponseEnvelope:
      type: object
      properties:
        result:
          $ref: "#/components/schemas/DataNetwork"

    ListDataNetworksResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/DataNetwork"
        page:
          type: integer
        per_page:
          type: integer
        total_count:
          type: integer
      required: [items, page, per_page, total_count]

    ListDataNetworksResponseEnvelope:
      type: object
      properties:
        result:
          $ref: "#/components/schemas/ListDataNetworksResponse"

    CreateDataNetworkParams:
      type: object
      required: [name, ip_pool, dns, mtu]
      properties:
        name:
          type: string
          description: "Valid DNN format (lowercase alphanumeric, hyphens, dots)."
        ip_pool:
          type: string
          description: "CIDR notation (e.g. \"10.0.0.0/24\")."
        dns:
          type: string
          description: DNS server IP address.
        mtu:
          type: integer
          minimum: 0
          maximum: 65535

    UpdateDataNetworkParams:
      type: object
      required: [ip_pool, dns, mtu]
      properties:
        ip_pool:
          type: string
          description: "CIDR notation (e.g. \"10.0.0.0/24\")."
        dns:
          type: string
          description: DNS server IP address.
        mtu:
          type: integer
          minimum: 0
          maximum: 65535

    IPAllocationItem:
      type: object
      properties:
        address:
          type: string
          description: Allocated IP address.
        imsi:
          type: string
          description: IMSI of the subscriber holding the lease.
        type:
          type: string
          description: "Lease type (e.g. \"dynamic\")."
        session_id:
          type: integer
          nullable: true
          description: PDU session ID, or null if the lease is not tied to an active session.
      required: [address, imsi, type, session_id]

    ListIPAllocationsResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/IPAllocationItem"
        page:
          type: integer
        per_page:
          type: integer
        total_count:
          type: integer
      required: [items, page, per_page, total_count]

    ListIPAllocationsResponseEnvelope:
      type: object
      properties:
        result:
          $ref: "#/components/schemas/ListIPAllocationsResponse"

    # ── Routes ──────────────────────────────────────────────────────────
    Route:
      type: object
      properties:
        id:
          type: integer
          format: int64
          description: Route ID. Zero for BGP-learned routes.
        destination:
          type: string
          description: "Destination in CIDR notation."
        gateway:
          type: string
          description: Gateway IPv4 address.
        interface:
          type: string
          description: "Network interface: `n3` or `n6`."
          enum: [n3, n6]
        metric:
          type: integer
        source:
          type: string
          description: "Route source: `static` for user-configured routes, `bgp` for BGP-learned routes."
          enum: [static, bgp]
      required: [id, destination, gateway, interface, metric, source]

    RouteResponseEnvelope:
      type: object
      properties:
        result:
          $ref: "#/components/schemas/Route"

    ListRoutesResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Route"
        page:
          type: integer
        per_page:
          type: integer
        total_count:
          type: integer
      required: [items, page, per_page, total_count]

    ListRoutesResponseEnvelope:
      type: object
      properties:
        result:
          $ref: "#/components/schemas/ListRoutesResponse"

    CreateRouteParams:
      type: object
      required: [destination, gateway, interface, metric]
      properties:
        destination:
          type: string
          description: "Destination in CIDR notation."
        gateway:
          type: string
          description: Gateway IPv4 address.
        interface:
          type: string
          enum: [n3, n6]
        metric:
          type: integer
          minimum: 0

    CreateRouteResponseEnvelope:
      type: object
      properties:
        result:
          $ref: "#/components/schemas/CreateSuccessResponse"

    # ── NAT ─────────────────────────────────────────────────────────────
    NATInfo:
      type: object
      properties:
        enabled:
          type: boolean
      required: [enabled]

    NATInfoResponseEnvelope:
      type: object
      properties:
        result:
          $ref: "#/components/schemas/NATInfo"

    UpdateNATInfoParams:
      type: object
      required: [enabled]
      properties:
        enabled:
          type: boolean

    # ── BGP ──────────────────────────────────────────────────────────────
    BGPSettings:
      type: object
      properties:
        enabled:
          type: boolean
        localAS:
          type: integer
        routerID:
          type: string
        listenAddress:
          type: string
        rejectedPrefixes:
          type: array
          description: |
            Read-only safety filters automatically derived from the infrastructure configuration.
            Any learned BGP route that overlaps these prefixes is rejected to protect internal traffic.
          items:
            $ref: "#/components/schemas/RejectedPrefix"
      required: [enabled, localAS, routerID, listenAddress, rejectedPrefixes]

    BGPSettingsResponseEnvelope:
      type: object
      properties:
        result:
          $ref: "#/components/schemas/BGPSettings"

    UpdateBGPSettingsParams:
      type: object
      required: [enabled, localAS, routerID, listenAddress]
      properties:
        enabled:
          type: boolean
        localAS:
          type: integer
        routerID:
          type: string
        listenAddress:
          type: string

    BGPImportPrefix:
      type: object
      properties:
        prefix:
          type: string
          description: CIDR prefix (e.g. "0.0.0.0/0", "10.100.0.0/16").
        maxLength:
          type: integer
          description: Maximum prefix length to accept. Must be between the prefix length and 32.
      required: [prefix, maxLength]

    BGPPeer:
      type: object
      properties:
        id:
          type: integer
        address:
          type: string
        remoteAS:
          type: integer
        holdTime:
          type: integer
        hasPassword:
          type: boolean
          description: Whether the peer has an MD5 authentication password configured.
        description:
          type: string
        importPrefixes:
          type: array
          items:
            $ref: "#/components/schemas/BGPImportPrefix"
          description: Import prefix list. Routes from this peer are only accepted if they match an entry. Empty means accept nothing (RFC 8212).
        state:
          type: string
          description: Live session state (e.g. "established", "active", "idle"). Empty when BGP is off.
        uptime:
          type: string
          description: Session uptime (e.g. "5m30s"). Only present when state is "established".
        prefixesSent:
          type: integer
          description: Number of prefixes advertised to this peer.
        prefixesReceived:
          type: integer
          description: Number of prefixes received from this peer (from GoBGP counters).
        prefixesAccepted:
          type: integer
          description: Number of prefixes accepted and installed in the kernel from this peer.
      required: [id, address, remoteAS, holdTime, hasPassword, description, importPrefixes]

    BGPPeerResponseEnvelope:
      type: object
      properties:
        result:
          $ref: "#/components/schemas/BGPPeer"

    ListBGPPeersResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/BGPPeer"
        page:
          type: integer
        per_page:
          type: integer
        total_count:
          type: integer
      required: [items, page, per_page, total_count]

    ListBGPPeersResponseEnvelope:
      type: object
      properties:
        result:
          $ref: "#/components/schemas/ListBGPPeersResponse"

    CreateBGPPeerParams:
      type: object
      required: [address, remoteAS]
      properties:
        address:
          type: string
          description: IPv4 address of the peer.
        remoteAS:
          type: integer
          description: Remote autonomous system number.
        holdTime:
          type: integer
          default: 90
          minimum: 3
          maximum: 65535
          description: BGP hold timer in seconds. Keepalive is derived as holdTime / 3.
        password:
          type: string
          description: MD5 authentication password. Omit for no authentication.
        description:
          type: string
        importPrefixes:
          type: array
          items:
            $ref: "#/components/schemas/BGPImportPrefix"
          description: Import prefix list for routes received from this peer.

    UpdateBGPPeerParams:
      type: object
      required: [address, remoteAS]
      properties:
        address:
          type: string
          description: IPv4 address of the peer.
        remoteAS:
          type: integer
          description: Remote autonomous system number.
        holdTime:
          type: integer
          default: 90
          minimum: 3
          maximum: 65535
          description: BGP hold timer in seconds. Keepalive is derived as holdTime / 3.
        password:
          type: string
          description: MD5 authentication password. Omit for no authentication.
        description:
          type: string
        importPrefixes:
          type: array
          items:
            $ref: "#/components/schemas/BGPImportPrefix"
          description: Import prefix list for routes received from this peer.

    BGPRoute:
      type: object
      properties:
        subscriber:
          type: string
        prefix:
          type: string
        nextHop:
          type: string
      required: [subscriber, prefix, nextHop]

    BGPAdvertisedRoutesResponse:
      type: object
      properties:
        routes:
          type: array
          items:
            $ref: "#/components/schemas/BGPRoute"
      required: [routes]

    BGPAdvertisedRoutesResponseEnvelope:
      type: object
      properties:
        result:
          $ref: "#/components/schemas/BGPAdvertisedRoutesResponse"

    BGPLearnedRoute:
      type: object
      properties:
        prefix:
          type: string
        nextHop:
          type: string
        peer:
          type: string
          description: Address of the peer that advertised this route.
      required: [prefix, nextHop, peer]

    BGPLearnedRoutesResponse:
      type: object
      properties:
        routes:
          type: array
          items:
            $ref: "#/components/schemas/BGPLearnedRoute"
      required: [routes]

    BGPLearnedRoutesResponseEnvelope:
      type: object
      properties:
        result:
          $ref: "#/components/schemas/BGPLearnedRoutesResponse"

    RejectedPrefix:
      type: object
      properties:
        prefix:
          type: string
          description: The CIDR prefix that is rejected.
        source:
          type: string
          enum: [builtin, data_network, interface]
          description: Origin of the filter rule.
        description:
          type: string
          description: Human-readable explanation of the filter.
      required: [prefix, source, description]

    # ── Flow Accounting ─────────────────────────────────────────────────
    FlowAccountingInfo:
      type: object
      properties:
        enabled:
          type: boolean
      required: [enabled]

    FlowAccountingInfoResponseEnvelope:
      type: object
      properties:
        result:
          $ref: "#/components/schemas/FlowAccountingInfo"

    UpdateFlowAccountingInfoParams:
      type: object
      required: [enabled]
      properties:
        enabled:
          type: boolean

    # ── Interfaces ──────────────────────────────────────────────────────
    Vlan:
      type: object
      properties:
        master_interface:
          type: string
        vlan_id:
          type: integer

    N2Interface:
      type: object
      properties:
        address:
          type: string
        port:
          type: integer
      required: [address, port]

    N3Interface:
      type: object
      properties:
        name:
          type: string
        address:
          type: string
        external_address:
          type: string
        vlan:
          $ref: "#/components/schemas/Vlan"
      required: [name, address, external_address]

    N6Interface:
      type: object
      properties:
        name:
          type: string
        vlan:
          $ref: "#/components/schemas/Vlan"
      required: [name]

    APIInterface:
      type: object
      properties:
        addresses:
          type: array
          items:
            type: string
        port:
          type: integer
      required: [addresses, port]

    NetworkInterfaces:
      type: object
      properties:
        n2:
          $ref: "#/components/schemas/N2Interface"
        n3:
          $ref: "#/components/schemas/N3Interface"
        n6:
          $ref: "#/components/schemas/N6Interface"
        api:
          $ref: "#/components/schemas/APIInterface"

    NetworkInterfacesResponseEnvelope:
      type: object
      properties:
        result:
          $ref: "#/components/schemas/NetworkInterfaces"

    UpdateN3SettingsParams:
      type: object
      properties:
        external_address:
          type: string
          description: "External/advertised IP address. Empty string to use default."

    # ── Radios ──────────────────────────────────────────────────────────
    PlmnID:
      type: object
      properties:
        mcc:
          type: string
        mnc:
          type: string
      required: [mcc, mnc]

    Tai:
      type: object
      properties:
        plmnID:
          $ref: "#/components/schemas/PlmnID"
        tac:
          type: string
      required: [plmnID, tac]

    Snssai:
      type: object
      properties:
        sst:
          type: integer
        sd:
          type: string

    SupportedTAI:
      type: object
      properties:
        tai:
          $ref: "#/components/schemas/Tai"
        snssais:
          type: array
          items:
            $ref: "#/components/schemas/Snssai"

    Radio:
      type: object
      properties:
        name:
          type: string
        id:
          type: string
        address:
          type: string
        ran_node_type:
          type: string
          enum: [gNB, ng-eNB, N3IWF, Unknown]
          description: Type of the RAN node.
        supported_tais:
          type: array
          deprecated: true
          description: "Deprecated: use GET /api/v1/ran/radios/{name} for full radio details including supported TAIs."
          items:
            $ref: "#/components/schemas/SupportedTAI"
      required: [name, id, address, ran_node_type, supported_tais]

    RadioDetail:
      type: object
      description: Detailed information about a connected radio base station.
      properties:
        name:
          type: string
        id:
          type: string
          description: GnB ID value.
        address:
          type: string
          description: SCTP remote address (IP:port).
        connected_at:
          type: string
          format: date-time
          description: Timestamp when the radio connected (RFC 3339).
        last_seen_at:
          type: string
          format: date-time
          description: Timestamp of the last NGAP message received from the radio (RFC 3339).
        ran_node_type:
          type: string
          enum: [gNB, ng-eNB, N3IWF, Unknown]
          description: Type of the RAN node.
        supported_tais:
          type: array
          items:
            $ref: "#/components/schemas/SupportedTAI"
      required: [name, id, address, connected_at, last_seen_at, ran_node_type, supported_tais]

    RadioResponseEnvelope:
      type: object
      properties:
        result:
          $ref: "#/components/schemas/RadioDetail"

    ListRadiosResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Radio"
        page:
          type: integer
        per_page:
          type: integer
        total_count:
          type: integer
      required: [items, page, per_page, total_count]

    ListRadiosResponseEnvelope:
      type: object
      properties:
        result:
          $ref: "#/components/schemas/ListRadiosResponse"

    # ── Radio Events ────────────────────────────────────────────────────
    RadioEvent:
      type: object
      properties:
        id:
          type: integer
        timestamp:
          type: string
        protocol:
          type: string
        message_type:
          type: string
        direction:
          type: string
          enum: [inbound, outbound]
        radio:
          type: string
          description: Name of the radio base station.
        address:
          type: string
          description: Network address of the radio.
        raw:
          type: string
          format: byte
          description: Base64-encoded raw message bytes.
        details:
          type: string
      required: [id, timestamp, protocol, message_type, direction, radio, address]

    ListRadioEventsResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/RadioEvent"
        page:
          type: integer
        per_page:
          type: integer
        total_count:
          type: integer
      required: [items, page, per_page, total_count]

    ListRadioEventsResponseEnvelope:
      type: object
      properties:
        result:
          $ref: "#/components/schemas/ListRadioEventsResponse"

    RadioEventDetail:
      type: object
      properties:
        raw:
          type: string
          format: byte
          description: Base64-encoded raw NGAP message bytes.
        decoded:
          type: object
          description: Decoded NGAP message structure. The shape depends on the NGAP PDU type.
          properties:
            pdu_type:
              type: string
              description: "NGAP PDU type (e.g. InitiatingMessage, SuccessfulOutcome, UnsuccessfulOutcome)."
            procedure_code:
              type: object
              description: "NGAP procedure code."
              properties:
                type:
                  type: string
                value:
                  type: integer
                label:
                  type: string
                unknown:
                  type: boolean
            summary:
              type: string
              description: "One-line summary of the decoded message (e.g. InitialUEMessage, RAN-UE=1, NAS=RegistrationRequest)."
            criticality:
              type: object
              description: "NGAP criticality."
              properties:
                type:
                  type: string
                value:
                  type: integer
                label:
                  type: string
                unknown:
                  type: boolean
            value:
              type: object
              description: "Decoded NGAP message payload. Structure varies by message type."
              additionalProperties: true
          additionalProperties: true

    RadioEventDetailResponseEnvelope:
      type: object
      properties:
        result:
          $ref: "#/components/schemas/RadioEventDetail"

    # ── Flow Reports ────────────────────────────────────────────────────
    FlowReport:
      type: object
      properties:
        id:
          type: integer
        subscriber_id:
          type: string
          description: Subscriber IMSI.
        source_ip:
          type: string
        destination_ip:
          type: string
        source_port:
          type: integer
        destination_port:
          type: integer
        protocol:
          type: integer
          description: IP protocol number.
        packets:
          type: integer
        bytes:
          type: integer
        start_time:
          type: string
        end_time:
          type: string
        direction:
          type: string
          enum: [uplink, downlink]
        action:
          type: string
          enum: [allow, drop]
          description: Flow action — whether the flow was accepted or dropped by the UPF.
      required: [id, subscriber_id, source_ip, destination_ip, source_port, destination_port, protocol, packets, bytes, start_time, end_time, direction, action]

    ListFlowReportsResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/FlowReport"
        page:
          type: integer
        per_page:
          type: integer
        total_count:
          type: integer
      required: [items, page, per_page, total_count]

    ListFlowReportsResponseEnvelope:
      type: object
      properties:
        result:
          $ref: "#/components/schemas/ListFlowReportsResponse"

    FlowReportProtocolStat:
      type: object
      properties:
        protocol:
          type: integer
        count:
          type: integer

    FlowReportIPStat:
      type: object
      properties:
        ip:
          type: string
        count:
          type: integer

    FlowReportStats:
      type: object
      properties:
        protocols:
          type: array
          items:
            $ref: "#/components/schemas/FlowReportProtocolStat"
        top_destinations_uplink:
          type: array
          items:
            $ref: "#/components/schemas/FlowReportIPStat"

    FlowReportStatsResponseEnvelope:
      type: object
      properties:
        result:
          $ref: "#/components/schemas/FlowReportStats"

    # ── Audit Logs ──────────────────────────────────────────────────────
    AuditLog:
      type: object
      properties:
        id:
          type: integer
        timestamp:
          type: string
        level:
          type: string
        user:
          type: string
          description: Email of the user who performed the action.
        action:
          type: string
          description: Action identifier (e.g. create_subscriber, delete_route).
        ip:
          type: string
          description: Client IP address.
        details:
          type: string
      required: [id, timestamp, level, user, action, ip, details]

    ListAuditLogsResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/AuditLog"
        page:
          type: integer
        per_page:
          type: integer
        total_count:
          type: integer
      required: [items, page, per_page, total_count]

    ListAuditLogsResponseEnvelope:
      type: object
      properties:
        result:
          $ref: "#/components/schemas/ListAuditLogsResponse"

    # ── Cluster ─────────────────────────────────────────────────────────
    ClusterStatus:
      type: object
      description: Cluster information. Only present when clustering is enabled.
      properties:
        enabled:
          type: boolean
        role:
          type: string
          description: "Raft role of this node (e.g. Leader, Follower, Candidate)."
        nodeId:
          type: integer
          description: Raft node ID of this instance.
        isLeader:
          type: boolean
          description: True when this node is the current Raft leader.
        leaderNodeId:
          type: integer
          description: Raft node ID of the current leader. Zero when the leader is unknown or its cluster_members row is not yet present.
        appliedIndex:
          type: integer
          format: uint64
          description: Last applied Raft log index.
        clusterId:
          type: string
          description: Cluster ID from the operator configuration. Omitted when not set.
        leaderAPIAddress:
          type: string
          description: >-
            HTTP API URL of the current Raft leader (e.g.
            `https://10.0.0.1:5000`). Empty when the leader is unknown.
            The Raft transport address is available on
            `/api/v1/cluster/members` as `raftAddress`.
      required: [enabled, role, nodeId, isLeader, leaderNodeId, appliedIndex]

    ClusterMember:
      type: object
      properties:
        nodeId:
          type: integer
          description: Raft node ID.
        raftAddress:
          type: string
          description: "Address used for Raft consensus (host:port)."
        apiAddress:
          type: string
          description: "API address for proxying requests (host:port)."
        binaryVersion:
          type: string
          description: Software version reported by this member.
        suffrage:
          type: string
          enum: [voter, nonvoter]
          description: Whether this member participates in leader election.
        maxSchemaVersion:
          type: integer
          description: >-
            Highest shared-DB schema version this member's binary can
            apply. Compared against the cluster's applied schema during
            rolling upgrades to gate migrations behind quorum support.
        isLeader:
          type: boolean
          description: True when this member is the current Raft leader.
        drainState:
          type: string
          enum: [active, draining, drained]
          description: >-
            Current drain state of the member. `active` is the default
            (serving traffic). `draining` means drain has started and the
            deadline has not elapsed. `drained` means the node is safe to
            remove.
        drainUpdatedAt:
          type: string
          format: date-time
          description: >-
            RFC 3339 timestamp of the last drainState change. Empty when the
            node has never been drained.
      required: [nodeId, raftAddress, apiAddress, binaryVersion, suffrage, maxSchemaVersion, isLeader, drainState]

    ListClusterMembersResponseEnvelope:
      type: object
      properties:
        result:
          type: array
          items:
            $ref: "#/components/schemas/ClusterMember"

    GetClusterMemberResponseEnvelope:
      type: object
      properties:
        result:
          $ref: "#/components/schemas/ClusterMember"

    AutopilotServer:
      type: object
      description: Live autopilot view of a single cluster peer.
      properties:
        nodeId:
          type: integer
          description: Raft node ID.
        raftAddress:
          type: string
          description: "Raft transport address of this peer (host:port)."
        nodeStatus:
          type: string
          description: >-
            Autopilot lifecycle state for this peer (e.g. `alive`, `left`,
            `failed`). A node goes `left` once it has missed heartbeats for
            longer than the configured LastContactThreshold.
        healthy:
          type: boolean
          description: >-
            Autopilot's health verdict for this peer, combining
            last-contact, last-term, and log-lag checks against the
            autopilot configuration.
        isLeader:
          type: boolean
          description: True when this peer is the current Raft leader.
        hasVotingRights:
          type: boolean
          description: True when this peer is a voter or leader (not a nonvoter).
        lastContactMs:
          type: integer
          format: int64
          description: >-
            Milliseconds since this peer last heartbeated with the leader.
            Zero for the leader's own row.
        lastTerm:
          type: integer
          format: uint64
          description: Highest Raft term this peer has a record of.
        lastIndex:
          type: integer
          format: uint64
          description: >-
            Last log index this peer has acknowledged. Compare to the
            leader's row to read replication lag.
        stableSince:
          type: string
          format: date-time
          description: >-
            UTC timestamp of the last time this peer's `healthy` value
            changed. Used by autopilot's promotion logic and surfaced as a
            signal of churn. Omitted when unknown.
      required: [nodeId, raftAddress, nodeStatus, healthy, isLeader, hasVotingRights, lastContactMs, lastTerm, lastIndex]

    AutopilotState:
      type: object
      description: >-
        Live cluster health produced by raft-autopilot on the leader.
        Complements `/api/v1/cluster/members` (static configuration) by
        answering operational questions like "is the cluster actually
        healthy" and "how many more failures can it survive."
      properties:
        healthy:
          type: boolean
          description: True when every voter is healthy.
        failureTolerance:
          type: integer
          description: >-
            Number of voter failures the cluster can currently absorb
            without losing quorum. Zero means any additional failure
            stalls writes.
        leaderNodeId:
          type: integer
          description: Raft node ID of the current leader; zero when unknown.
        voters:
          type: array
          items:
            type: integer
          description: Node IDs of voting members, ascending.
        servers:
          type: array
          items:
            $ref: "#/components/schemas/AutopilotServer"
          description: Per-peer state, sorted by nodeId.
      required: [healthy, failureTolerance, leaderNodeId, voters, servers]

    AutopilotStateResponseEnvelope:
      type: object
      properties:
        result:
          $ref: "#/components/schemas/AutopilotState"

    AddClusterMemberParams:
      type: object
      required: [nodeId, raftAddress, apiAddress]
      properties:
        nodeId:
          type: integer
          minimum: 1
          description: Raft node ID for the new member.
        raftAddress:
          type: string
          description: "Raft consensus address of the new member (host:port)."
        apiAddress:
          type: string
          description: "API address of the new member (host:port)."
        suffrage:
          type: string
          enum: [voter, nonvoter]
          description: "Whether the new member is a voter or nonvoter. Defaults to voter."
        clusterId:
          type: string
          description: Cluster ID to validate against the operator configuration.
        schemaVersion:
          type: integer
          description: Schema version of the joining node. Rejected if lower than the leader's schema.
        maxSchemaVersion:
          type: integer
          description: >-
            Highest shared-DB schema version the joining node's binary can
            apply. Recorded on the cluster member row so the cluster can
            gate migrations on quorum support during rolling upgrades.

    DrainParams:
      type: object
      properties:
        deadlineSeconds:
          type: integer
          minimum: 0
          maximum: 3600
          description: >-
            Seconds to wait for the target's local active-lease count to
            reach zero before forcibly setting drainState to "drained".
            When 0 (default) the drain is synchronous and returns with
            drainState=drained.

    DrainResponse:
      type: object
      properties:
        message:
          type: string
        state:
          type: string
          enum: [active, draining, drained]
          description: Drain state of the target node after the call.
        transferredLeadership:
          type: boolean
          description: Whether Raft leadership was transferred to another node.
        ransNotified:
          type: integer
          description: Number of RANs notified to redirect UE registrations.
        bgpStopped:
          type: boolean
          description: Whether BGP advertisements were withdrawn.
        sessionsRemaining:
          type: integer
          description: Active leases still on the target when the response was built.
      required: [message, state, transferredLeadership, ransNotified, bgpStopped, sessionsRemaining]

    DrainResponseEnvelope:
      type: object
      properties:
        result:
          $ref: "#/components/schemas/DrainResponse"

    ResumeResponse:
      type: object
      properties:
        message:
          type: string
        state:
          type: string
          enum: [active]
        bgpStarted:
          type: boolean
          description: Whether the local BGP speaker was restarted.
      required: [message, state, bgpStarted]

    ResumeResponseEnvelope:
      type: object
      properties:
        result:
          $ref: "#/components/schemas/ResumeResponse"
