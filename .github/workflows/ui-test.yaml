name: UI Test

on:
  workflow_call:

permissions:
  contents: read

jobs:
  ui-test:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v7

      - name: use npm
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install dependencies
        run: |
          npm install --prefix ui

      - name: Run unit tests
        run: |
          npm run test --prefix ui
