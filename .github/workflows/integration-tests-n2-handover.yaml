name: N2 Handover integration tests

permissions:
  contents: read

on:
  workflow_call:

jobs:
  n2-handover-integration-test:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download Ella Core image from GitHub Artifact
        uses: actions/download-artifact@v8
        with:
          name: ellacore-image-amd64

      - name: Download Ella Core Tester image from GitHub Artifact
        uses: actions/download-artifact@v8
        with:
          name: ellacore-tester-image-amd64

      - name: Load images into Docker
        run: |
          docker load -i ellacore_latest-amd64.tar
          docker load -i ellacore_tester_latest-amd64.tar

      - uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"

      - name: Install libpcap headers
        run: sudo apt-get update && sudo apt-get install -y libpcap-dev

      - name: Run N2 Handover integration tests
        env:
          INTEGRATION: "1"
          HA_CLUSTER_LOG_DIR: ${{ runner.temp }}/ha-cluster-logs
        run: |
          go test ./integration/... -run TestIntegrationN2Handover -v -timeout 10m

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: n2-handover-logs
          path: /tmp/n2-handover-logs
          if-no-files-found: ignore
          retention-days: 7
