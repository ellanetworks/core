name: Integration tests - API matrix HA

permissions:
  contents: read

on:
  workflow_call:

jobs:
  api-matrix-ha-test:
    # The HA API matrix exercises raft-replicated REST surface on a
    # 3-node cluster. Like the standalone matrix it has no NGAP/NAS/UPF
    # data plane, so a single architecture and the IPv4 compose are
    # sufficient — cross-family is already covered by integration-tests-ha.
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download Container image from GitHub Artifact
        uses: actions/download-artifact@v8
        with:
          name: ellacore-image-amd64

      - name: Load container image
        run: |
          docker load -i ellacore_latest-amd64.tar

      - uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"

      - name: Run API matrix HA integration test
        env:
          HA_CLUSTER_LOG_DIR: ${{ runner.temp }}/ha-cluster-logs
        run: |
          INTEGRATION=1 IP_VERSION=ipv4 go test ./integration -run TestAPIMatrixHA -v -timeout 15m

      - name: Upload cluster logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: api-matrix-ha-cluster-logs
          path: ${{ runner.temp }}/ha-cluster-logs
          if-no-files-found: ignore
          retention-days: 7
