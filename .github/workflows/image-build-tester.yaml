name: Image Build (tester)

permissions:
  contents: read

on:
  workflow_call:

jobs:
  build-image-tester:
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
    runs-on: ${{ (matrix.arch == 'arm64' && 'ubuntu-24.04-arm') || 'ubuntu-24.04' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Stage tester rockcraft manifest
        run: |
          rm -f rockcraft.yaml
          mv rockcraft-tester.yaml rockcraft.yaml

      - uses: canonical/craft-actions/rockcraft-pack@acd2f2e61c7563b38ba89390ca0e910fa7d2784f # main
        id: rockcraft
        with:
          rockcraft-channel: stable

      - name: Save container image to file
        run: |
          rock_file=$(ls *.rock | tail -n 1)
          sudo rockcraft.skopeo --insecure-policy copy oci-archive:"${rock_file}" docker-daemon:ella-core-tester:latest
          docker save -o ellacore_tester_latest-${{ matrix.arch }}.tar ella-core-tester:latest

      - name: Upload container image to GitHub Artifact
        uses: actions/upload-artifact@v7
        with:
          name: ellacore-tester-image-${{ matrix.arch }}
          path: ellacore_tester_latest-${{ matrix.arch }}.tar
