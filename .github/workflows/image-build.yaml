name: Image Build

permissions:
  contents: read

on:
  workflow_call:

jobs:
  build-image:
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
    runs-on: ${{ (matrix.arch == 'arm64' && 'ubuntu-24.04-arm') || 'ubuntu-24.04' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rockcraft
        run: |
          sudo snap wait system seed.loaded
          sudo snap set system refresh.hold="$(date --date='+2 weeks' +%Y-%m-%dT%H:%M:%S%:z)"
          sudo snap install rockcraft --classic --channel stable

      - name: Build rock (destructive mode)
        run: sudo rockcraft pack --destructive-mode

      - name: Save container image to file
        run: |
          rock_file=$(ls *.rock | tail -n 1)
          sudo rockcraft.skopeo --insecure-policy copy oci-archive:"${rock_file}" docker-daemon:ella-core:latest
          docker save -o ellacore_latest-${{ matrix.arch }}.tar ella-core:latest

      - name: Upload container image to GitHub Artifact
        uses: actions/upload-artifact@v7
        with:
          name: ellacore-image-${{ matrix.arch }}
          path: ellacore_latest-${{ matrix.arch }}.tar
